<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Kuran Dinle PRO</title>

<style>
body{
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
  margin:0;
  user-select:none;
}

select,input,button{
  padding:10px;
  margin:6px;
  font-size:16px;
  border-radius:8px;
  border:none;
}

.ayet{
  padding:12px;
  font-size:20px;
}

.ar{
  font-size:26px;
}

.tr{
  font-size:14px;
  color:#aaa;
}

.active{
  background:yellow;
  color:black;
}

.kalp{
  cursor:pointer;
  margin-left:10px;
}
</style>
</head>

<body>

<h1>KURAN DİNLE PRO</h1>

<select id="sure"></select><br>

Başlangıç:
<input type="number" id="start" value="1"><br>

<label>
<input type="checkbox" id="auto"> Otomatik geç
</label><br>

<button onclick="load()">Yükle</button>
<button id="btn" onclick="toggle()">▶ Başlat</button>

<div id="list"></div>

<audio id="p"></audio>

<script>

let data=[];
let i=0;
let sura=1;
let p=document.getElementById("p");

// sure listesi
fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(d=>{
  d.data.forEach(s=>{
    let o=document.createElement("option");
    o.value=s.number;
    o.textContent=s.number+"."+s.englishName;
    sure.appendChild(o);
  });
});

// yükle
function load(){
  sura=sure.value;

  Promise.all([
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/ar.alafasy`).then(r=>r.json()),
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/tr.diyanet`).then(r=>r.json())
  ])
  .then(([ar,tr])=>{

    data=ar.data.ayahs;

    list.innerHTML="";

    data.forEach((a,x)=>{

      let fav=localStorage.getItem("fav_"+sura+"_"+x)=="1";

      let d=document.createElement("div");
      d.className="ayet";
      d.id="a"+x;

      d.innerHTML=`
      <div class="ar">${a.text}</div>
      <div class="tr">${tr.data.ayahs[x].text}</div>
      <span class="kalp" onclick="favToggle(${x})">${fav?"❤️":"🤍"}</span>
      `;

      list.appendChild(d);
    });

    p.src="";
  });
}

// favori toggle
function favToggle(x){
  let key="fav_"+sura+"_"+x;
  let val=localStorage.getItem(key);

  if(val=="1"){
    localStorage.removeItem(key);
  }else{
    localStorage.setItem(key,"1");
  }

  load();
}

// başlat/duraklat
function toggle(){

  if(p.src==""){
    i=start.value-1;
    play();
    return;
  }

  if(p.paused){
    p.play();
    btn.innerHTML="⏸";
  }else{
    p.pause();
    btn.innerHTML="▶";
  }
}

// oynat
function play(){

  if(i>=data.length){
    next();
    return;
  }

  p.src=data[i].audio;

  document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("active"));

  let el=document.getElementById("a"+i);
  if(el){
    el.classList.add("active");
    el.scrollIntoView({behavior:"smooth",block:"center"});
  }

  p.play().catch(()=>{});
  btn.innerHTML="⏸";

  p.onended=()=>{
    i++;
    play();
  };
}

// sonraki sure
function next(){
  if(!auto.checked) return;

  sura++;
  if(sura>114) return;

  sure.value=sura;
  load();

  setTimeout(()=>{
    i=0;
    play();
  },1000);
}

</script>

</body>
</html>
