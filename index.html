<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

<!-- ZOOM KAPALI -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Kuran Dinle PRO</title>

<style>

body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;

  /* GERÇEK KURAN GÖRSELİ */
  background:url("https://upload.wikimedia.org/wikipedia/commons/9/97/Quran_open.jpg") no-repeat center center fixed;
  background-size:cover;

  /* YAZI SEÇME KAPALI */
  user-select:none;
  -webkit-user-select:none;
}

.overlay{
  background:rgba(0,0,0,0.75);
  min-height:100vh;
  padding:10px;
}

select,input,button{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

.ayet{
  padding:15px;
  border-bottom:1px solid #444;
}

.active{
  background:yellow;
  color:black;
}

.ar{font-size:26px;}
.tr{font-size:14px;color:#ccc;}

.kalp{font-size:22px;cursor:pointer;}

</style>
</head>

<body>

<div class="overlay">

<h1>KURAN DİNLE PRO</h1>

<select id="sure"></select><br>

Başlangıç:
<input type="number" id="start" value="1"><br>

<label>
<input type="checkbox" id="auto"> Otomatik geç
</label><br>

<button onclick="load()">Yükle</button>
<button onclick="startPlay()">▶ Başlat</button>
<button onclick="pausePlay()">⏸ Duraklat</button>

<div id="list"></div>

<audio id="player"></audio>

</div>

<script>

let data=[], trData=[];
let sura=1;
let currentIndex=0;
let interval=null;

const player=document.getElementById("player");

// SURELER
fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(d=>{
  d.data.forEach(s=>{
    let o=document.createElement("option");
    o.value=s.number;
    o.textContent=s.number+". "+s.englishName;
    sure.appendChild(o);
  });
});

// YÜKLE
function load(){

  sura = document.getElementById("sure").value;

  Promise.all([
    fetch(`https://api.alquran.cloud/v1/surah/${sura}`).then(r=>r.json()),
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/tr.diyanet`).then(r=>r.json())
  ])
  .then(([ar,tr])=>{

    data = ar.data.ayahs;
    trData = tr.data.ayahs;

    let list=document.getElementById("list");
    list.innerHTML="";

    data.forEach((a,x)=>{

      let div=document.createElement("div");
      div.className="ayet";
      div.id="a"+x;

      div.innerHTML=`
        <div class="ar">${a.text}</div>
        <div class="tr">${trData[x].text}</div>
        <div class="kalp">🤍</div>
      `;

      list.appendChild(div);
    });

  });
}

// BAŞLAT
function startPlay(){

  let no = String(sura).padStart(3,'0');

  player.src=`https://server8.mp3quran.net/afs/${no}.mp3`;
  player.play();

  // AYET TAKİP SÜRESİ (ortalama)
  let totalTime=player.duration || 60;
  let perAyah = totalTime / data.length;

  clearInterval(interval);

  interval=setInterval(()=>{

    document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("active"));

    let el=document.getElementById("a"+currentIndex);
    if(el){
      el.classList.add("active");
      el.scrollIntoView({behavior:"smooth",block:"center"});
    }

    currentIndex++;

  }, perAyah*1000);
}

// DURAKLAT
function pausePlay(){
  player.pause();
  clearInterval(interval);
}

</script>

</body>
</html>
