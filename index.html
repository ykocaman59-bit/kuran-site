<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Kuran Dinle PRO</title>

<style>
body{
  background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.95)),
    url("https://images.unsplash.com/photo-1585032226651-759b368d7246?q=80&w=1200")
    no-repeat center center fixed;

  background-size: cover;
  color:white;
  text-align:center;
  font-family:Arial;
  margin:0;
  user-select:none;
}

select,input,button{
  padding:12px;
  margin:6px;
  font-size:16px;
  border-radius:12px;
  border:none;
}

.ayet{
  padding:18px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(2px);
}

.active{
  background:rgba(255,255,0,0.85);
  color:black;
  border-radius:10px;
}

.ar{
  font-size:26px;
}

.tr{
  font-size:14px;
  color:#ddd;
}

.kalp{
  font-size:22px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>KURAN DİNLE PRO</h1>

<select id="sure"></select><br>

Başlangıç:
<input type="number" id="start" value="1" min="1"><br>

<label>
<input type="checkbox" id="auto"> Otomatik geç
</label><br>

<button onclick="load()">Yükle</button>
<button onclick="startPlay()">▶ Başlat</button>
<button onclick="pausePlay()">⏸ Duraklat</button>

<div id="list"></div>

<audio id="p"></audio>

<script>

let data=[];
let current=0;
let sura=1;
let isStarted=false;

const p=document.getElementById("p");

// SURELER
fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(d=>{
  d.data.forEach(s=>{
    let o=document.createElement("option");
    o.value=s.number;
    o.textContent=s.number+". "+s.englishName;
    sure.appendChild(o);
  });
});

// YÜKLE
function load(){

  sura = document.getElementById("sure").value;

  Promise.all([
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/ar.alafasy`).then(r=>r.json()),
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/tr.diyanet`).then(r=>r.json())
  ])
  .then(([ar,tr])=>{

    data = ar.data.ayahs;

    let list=document.getElementById("list");
    list.innerHTML="";

    data.forEach((a,x)=>{

      let fav = localStorage.getItem("fav_"+sura+"_"+x)=="1";

      let div=document.createElement("div");
      div.className="ayet";
      div.id="a"+x;

      div.innerHTML=`
        <div class="ar">${a.text}</div>
        <div class="tr">${tr.data.ayahs[x].text}</div>
        <div class="kalp" onclick="favToggle(event,${x})">
          ${fav?"❤️":"🤍"}
        </div>
      `;

      list.appendChild(div);
    });

  });
}

// FAVORİ
function favToggle(e,x){
  e.stopPropagation();
  e.preventDefault();

  let key="fav_"+sura+"_"+x;

  if(localStorage.getItem(key)){
    localStorage.removeItem(key);
  }else{
    localStorage.setItem(key,"1");
  }

  let el=document.getElementById("a"+x).querySelector(".kalp");
  el.innerHTML = localStorage.getItem(key) ? "❤️" : "🤍";
}

// BAŞLAT
function startPlay(){

  if(!isStarted){
    let start = document.getElementById("start").value;
    current = start - 1;
    isStarted = true;
    playNext();
    return;
  }

  p.play();
}

// DURAKLAT
function pausePlay(){
  p.pause();
}

// AYET AYET OYNAT
function playNext(){

  if(current >= data.length){
    nextSurah();
    return;
  }

  p.src = data[current].audio;

  document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("active"));

  let aktif = document.getElementById("a"+current);

  if(aktif){
    aktif.classList.add("active");
    aktif.scrollIntoView({behavior:"smooth",block:"center"});
  }

  p.play().catch(()=>{});

  p.onended = ()=>{
    current++;
    playNext();
  };
}

// SONRAKİ SURE
function nextSurah(){

  if(!document.getElementById("auto").checked) return;

  sura++;

  if(sura>114) return;

  document.getElementById("sure").value = sura;

  load();

  setTimeout(()=>{
    current=0;
    playNext();
  },1000);
}

</script>

</body>
</html>
