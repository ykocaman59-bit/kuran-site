<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kuran Dinle PRO+</title>

<style>
body {
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}

select,input,button {
    padding:10px;
    margin:5px;
    font-size:16px;
}

button {
    border:none;
    border-radius:10px;
}

#pauseBtn {
    display:none;
}

.ayet {
    padding:10px;
}

.active {
    background:yellow;
    color:black;
}

.meal {
    font-size:13px;
    color:#aaa;
}
</style>
</head>

<body>

<h2>KURAN DİNLE PRO+</h2>

<select id="sure"></select><br>

Başlangıç ayeti:
<input type="number" id="start" value="1" min="1"><br>

🎧 Hoca:
<select id="hoca">
<option value="ar.alafasy">Alafasy</option>
<option value="ar.abdurrahmaansudais">Sudais</option>
<option value="ar.saoodshuraym">Shuraym</option>
</select><br>

<label>
<input type="checkbox" id="autoNext" checked>
Sonraki sureye otomatik geç
</label><br>

<button onclick="load()">Yükle</button>

<br>

<button onclick="startPlay()" id="startBtn">▶ Başlat</button>
<button onclick="pausePlay()" id="pauseBtn">⏸ Duraklat</button>

<div id="ayetler"></div>

<audio id="player"></audio>

<script>

let player = document.getElementById("player");
let startBtn = document.getElementById("startBtn");
let pauseBtn = document.getElementById("pauseBtn");

let currentAyet=1;
let ayetList=[];
let currentSure=1;

// SURELER
fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(data=>{
    data.data.forEach(s=>{
        let opt=document.createElement("option");
        opt.value=s.number;
        opt.innerText = s.number + ". " + s.englishName;
        document.getElementById("sure").appendChild(opt);
    });
});

// YÜKLE
function load(){
    currentSure = document.getElementById("sure").value;
    currentAyet = parseInt(document.getElementById("start").value);

    fetch(`https://api.alquran.cloud/v1/surah/${currentSure}/editions/quran-uthmani,tr.diyanet`)
    .then(r=>r.json())
    .then(data=>{
        ayetList = data.data[0].ayahs;
        let mealList = data.data[1].ayahs;

        let html="";
        ayetList.forEach((a,i)=>{
            html+=`
            <div class="ayet" id="a${i+1}">
            ${i+1}. ${a.text}
            <div class="meal">${mealList[i].text}</div>
            </div>`;
        });

        document.getElementById("ayetler").innerHTML=html;
    });
}

// AYET ÇAL
function playAyet(){
    highlight();

    let hoca=document.getElementById("hoca").value;
    let globalAyet = ayetList[currentAyet-1].number;

    let url=`https://cdn.islamic.network/quran/audio/128/${hoca}/${globalAyet}.mp3`;

    player.src=url;
    player.play();

    startBtn.style.display="none";
    pauseBtn.style.display="inline-block";
}

// BAŞLAT
function startPlay(){
    if(player.src){
        player.play(); // kaldığı yerden devam
    }else{
        playAyet(); // ilk başlatma
    }

    startBtn.style.display="none";
    pauseBtn.style.display="inline-block";
}

// DURAKLAT
function pausePlay(){
    player.pause();

    pauseBtn.style.display="none";
    startBtn.style.display="inline-block";
}

// AYET BİTİNCE
player.onended=function(){
    currentAyet++;

    if(currentAyet>ayetList.length){
        if(document.getElementById("autoNext").checked){
            currentSure++;
            currentAyet=1;
            document.getElementById("sure").value=currentSure;
            load();
            setTimeout(playAyet,1000);
        }
    }else{
        playAyet();
    }
}

// HIGHLIGHT
function highlight(){
    document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("active"));
    let el=document.getElementById("a"+currentAyet);
    if(el) el.classList.add("active");
}

</script>

</body>
</html>
