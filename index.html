<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

<!-- ZOOM KAPALI -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Kuran Dinle PRO</title>

<style>

body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;

  /* KURAN GÖRSELİ */
  background:url("https://upload.wikimedia.org/wikipedia/commons/9/97/Quran_open.jpg") no-repeat center center fixed;
  background-size:cover;

  user-select:none;
}

.overlay{
  background:rgba(0,0,0,0.75);
  min-height:100vh;
  padding:10px;
}

select,input,button{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

.ayet{
  padding:15px;
  border-bottom:1px solid #444;
}

.active{
  background:yellow;
  color:black;
}

.ar{font-size:26px;}
.tr{font-size:14px;color:#ccc;}
.kalp{font-size:20px;cursor:pointer;}

#favBox{
  display:none;
  background:black;
  padding:10px;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="overlay">

<h1>KURAN DİNLE PRO</h1>

<select id="sure"></select><br>

Başlangıç:
<input type="number" id="start" value="1"><br>

<label>
<input type="checkbox" id="auto"> Otomatik geç
</label><br>

<button onclick="load()">Yükle</button>
<button onclick="startPlay()">▶ Başlat</button>
<button onclick="pausePlay()">⏸ Duraklat</button>
<button onclick="showFav()">❤️ Favoriler</button>

<div id="favBox"></div>
<div id="list"></div>

<audio id="player"></audio>

</div>

<script>

let data=[], trData=[];
let sura=1;
let currentIndex=0;
let interval=null;
let isPlaying=false;

const player=document.getElementById("player");

// SURELER
fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(d=>{
  d.data.forEach(s=>{
    let o=document.createElement("option");
    o.value=s.number;
    o.textContent=s.number+". "+s.englishName;
    sure.appendChild(o);
  });
});

// YÜKLE
function load(){

  sura = document.getElementById("sure").value;

  Promise.all([
    fetch(`https://api.alquran.cloud/v1/surah/${sura}`).then(r=>r.json()),
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/tr.diyanet`).then(r=>r.json())
  ])
  .then(([ar,tr])=>{

    data = ar.data.ayahs;
    trData = tr.data.ayahs;

    let list=document.getElementById("list");
    list.innerHTML="";

    data.forEach((a,x)=>{

      let fav = localStorage.getItem("fav_"+sura+"_"+x);

      let div=document.createElement("div");
      div.className="ayet";
      div.id="a"+x;

      div.innerHTML=`
        <div><b>${x+1}. Ayet</b></div>
        <div class="ar">${a.text}</div>
        <div class="tr">${trData[x].text}</div>
        <div class="kalp" onclick="favToggle(${x})">
          ${fav?"❤️":"🤍"}
        </div>
      `;

      list.appendChild(div);
    });

  });
}

// BAŞLAT
function startPlay(){

  if(!isPlaying){
    let no = String(sura).padStart(3,'0');
    player.src=`https://server8.mp3quran.net/afs/${no}.mp3`;
    isPlaying=true;
  }

  player.play();

  // duration yüklendikten sonra hesapla
  player.onloadedmetadata = ()=>{
    let perAyah = player.duration / data.length;

    clearInterval(interval);

    interval=setInterval(()=>{

      document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("active"));

      let el=document.getElementById("a"+currentIndex);
      if(el){
        el.classList.add("active");
        el.scrollIntoView({behavior:"smooth",block:"center"});
      }

      currentIndex++;

    }, perAyah*1000);
  };
}

// DURAKLAT (BAŞA DÖNMEZ)
function pausePlay(){
  player.pause();
  clearInterval(interval);
}

// FAVORİ
function favToggle(x){

  let key="fav_"+sura+"_"+x;

  if(localStorage.getItem(key)){
    localStorage.removeItem(key);
  }else{
    localStorage.setItem(key, JSON.stringify({
      sura:sura,
      ayet:x+1,
      text:trData[x].text
    }));
  }

  load();
}

// FAVORİ LİSTE
function showFav(){

  let box=document.getElementById("favBox");
  box.style.display = box.style.display=="block" ? "none":"block";

  box.innerHTML="<h3>Favori Ayetler</h3>";

  for(let i in localStorage){
    if(i.startsWith("fav_")){
      let d = JSON.parse(localStorage[i]);

      box.innerHTML += `
        <div style="margin:10px">
          Sure ${d.sura} - Ayet ${d.ayet}<br>
          ${d.text}<br>
          <button onclick="delFav('${i}')">Sil</button>
        </div>
      `;
    }
  }
}

function delFav(k){
  localStorage.removeItem(k);
  showFav();
}

</script>

</body>
</html>
