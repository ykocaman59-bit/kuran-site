<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kuran Dinle PRO</title>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: Arial;
}

button {
  padding: 10px;
  margin: 10px;
  font-size: 16px;
}

input {
  padding: 8px;
  width: 60px;
}

.ayet {
  padding: 10px;
}

.active {
  background: yellow;
  color: black;
}
</style>

</head>

<body>

<h1>KURAN DİNLE PRO</h1>

<select id="sureSelect"></select>

<br><br>

Başlangıç ayeti:
<input type="number" id="startAyet" value="1" min="1">

<br><br>

<label>
<input type="checkbox" id="autoNext">
Sonraki sureye otomatik geç
</label>

<br><br>

<button onclick="loadSurah()">Yükle</button>
<button onclick="playAudio()">Başlat</button>

<div id="ayetler"></div>

<br>
<audio id="player" controls></audio>

<script>

let ayetData = [];
let current = 0;
let currentSurah = 1;
let player = document.getElementById("player");

// SURELERİ ÇEK
fetch("https://api.alquran.cloud/v1/surah")
.then(res => res.json())
.then(data => {
  let select = document.getElementById("sureSelect");

  data.data.forEach(s => {
    let opt = document.createElement("option");
    opt.value = s.number;
    opt.innerText = s.number + ". " + s.englishName;
    select.appendChild(opt);
  });
});

// SURE YÜKLE
function loadSurah() {

  currentSurah = document.getElementById("sureSelect").value;

  fetch(`https://api.alquran.cloud/v1/surah/${currentSurah}/ar.alafasy`)
  .then(res => res.json())
  .then(data => {

    ayetData = data.data.ayahs;

    let div = document.getElementById("ayetler");
    div.innerHTML = "";

    ayetData.forEach((a, i) => {
      let p = document.createElement("div");
      p.className = "ayet";
      p.id = "a" + i;
      p.innerText = (i+1) + ". " + a.text;
      div.appendChild(p);
    });

  });
}

// BAŞLAT
function playAudio() {

  let start = document.getElementById("startAyet").value;
  current = start - 1;

  playNext();
}

// AYET AYET OYNAT
function playNext() {

  if (current >= ayetData.length) {
    nextSurah();
    return;
  }

  player.src = ayetData[current].audio;

  document.querySelectorAll(".ayet").forEach(e => e.classList.remove("active"));

  let aktif = document.getElementById("a" + current);
  if (aktif) aktif.classList.add("active");

  if (aktif) aktif.scrollIntoView({ behavior: "smooth", block: "center" });

  player.play().catch(() => {});

  player.onended = null;

  player.addEventListener("ended", function () {
    current++;
    playNext();
  }, { once: true });
}

// SONRAKİ SURE
function nextSurah() {

  let auto = document.getElementById("autoNext").checked;

  if (!auto) return;

  currentSurah++;

  if (currentSurah > 114) return;

  document.getElementById("sureSelect").value = currentSurah;

  loadSurah();

  setTimeout(() => {
    current = 0;
    playNext();
  }, 1000);
}

</script>

</body>
</html>
