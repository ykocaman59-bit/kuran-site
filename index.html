<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Kuran Dinle PRO</title>

<style>
body {
  background:#000;
  color:white;
  text-align:center;
  font-family:Arial;
  user-select:none;
}

button, select, input {
  padding:8px;
  margin:5px;
  font-size:16px;
}

.ayet {
  padding:10px;
  pointer-events:none;
}

.active {
  background:yellow;
  color:black;
}

.meal {
  font-size:13px;
  color:#aaa;
}

.fav {
  pointer-events:auto;
  cursor:pointer;
  font-size:18px;
}
</style>
</head>

<body>

<h2>KURAN DİNLE PRO</h2>

<select id="sure"></select><br>

Başlangıç ayeti:
<input type="number" id="start" value="1"><br>

🎧 Hoca:
<select id="hoca">
<option value="ar.alafasy">Alafasy</option>
<option value="ar.abdurrahmaansudais">Sudais</option>
<option value="ar.saoodshuraym">Shuraym</option>
</select><br>

<label>
<input type="checkbox" id="autoNext" checked>
Otomatik geç
</label><br>

<button onclick="load()">Yükle</button>
<button onclick="togglePlay()">▶ Başlat / ⏸</button>

<div id="ayetler"></div>

<audio id="player"></audio>

<script>

let player = document.getElementById("player");
let ayetList = [];
let mealList = [];
let current = 0;
let playing = false;
let favs = JSON.parse(localStorage.getItem("fav")||"[]");

// SURELER
fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(d=>{
  let s=document.getElementById("sure");
  d.data.forEach(x=>{
    let o=document.createElement("option");
    o.value=x.number;
    o.innerText=x.number+". "+x.englishName;
    s.appendChild(o);
  });
});

// YÜKLE (TEK API)
function load(){
  let sure=document.getElementById("sure").value;
  let start=parseInt(document.getElementById("start").value)-1;
  let hoca=document.getElementById("hoca").value;

  fetch(`https://api.alquran.cloud/v1/surah/${sure}/editions/${hoca},tr.diyanet`)
  .then(r=>r.json())
  .then(d=>{
    ayetList = d.data[0].ayahs; // SES
    mealList = d.data[1].ayahs; // MEAL
    current = start>=0?start:0;

    render();
    play();
  });
}

// AYETLER
function render(){
  let div=document.getElementById("ayetler");
  div.innerHTML="";

  ayetList.forEach((a,i)=>{
    let key=a.number;
    let heart = favs.includes(key) ? "❤️" : "🤍";

    div.innerHTML += `
      <div class="ayet" id="a${i}">
        ${i+1}. ${a.text}
        <span class="fav" onclick="event.stopPropagation();toggleFav(${key})">${heart}</span>
        <div class="meal">${mealList[i].text}</div>
      </div>
    `;
  });
}

// PLAY
function play(){
  if(!ayetList.length) return;

  player.src = ayetList[current].audio;
  player.play();
  playing=true;

  highlight();
}

// TOGGLE
function togglePlay(){
  if(!playing){
    play();
  }else{
    player.pause();
    playing=false;
  }
}

// 🔥 AYET BİTİNCE (TEMİZ)
player.onended = () => {
  current++;

  if(current >= ayetList.length){
    if(document.getElementById("autoNext").checked){
      current = 0;
    } else {
      playing = false;
      return;
    }
  }

  play();
};

// HIGHLIGHT
function highlight(){
  document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("active"));
  let el=document.getElementById("a"+current);
  if(el) el.classList.add("active");
}

// FAVORİ
function toggleFav(id){
  if(favs.includes(id)){
    favs = favs.filter(x=>x!==id);
  }else{
    favs.push(id);
  }
  localStorage.setItem("fav", JSON.stringify(favs));
  render();
}

</script>

</body>
</html>
