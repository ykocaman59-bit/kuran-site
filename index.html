<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>KURAN DİNLE PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

/* sade koyu arka plan */
.container{
  background:rgba(0,0,0,0.7);
  min-height:100vh;
  padding:20px;
}

h1{margin:10px;}

select,input,button{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

/* ayet */
.ayet{
  padding:15px;
  border-bottom:1px solid #333;
}

/* sarı takip */
.active{
  background:yellow;
  color:black;
}

/* kalp */
.heart{
  font-size:20px;
  cursor:pointer;
}

/* favori kutu */
.favBox{
  background:black;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>KURAN DİNLE PRO</h1>

<select id="sure">
  <option value="1">1. Fatiha</option>
  <option value="2">2. Bakara</option>
</select><br>

Başlangıç: <input id="start" value="1"><br>

<label><input type="checkbox" id="auto"> Otomatik geç</label><br>

<button onclick="load()">Yükle</button>
<button onclick="startPlay()">▶ Başlat</button>
<button onclick="pausePlay()">⏸ Duraklat</button>
<button onclick="showFav()">❤️ Favoriler</button>

<div id="favList"></div>
<div id="ayetler"></div>

<audio id="player"></audio>

</div>

<script>
let data=[], trData=[];
let currentIndex=0;
let interval;
let sura=1;

let player=document.getElementById("player");

/* yükle */
function load(){
  sura=document.getElementById("sure").value;

  fetch("https://api.alquran.cloud/v1/surah/"+sura)
  .then(r=>r.json())
  .then(d=>{
    data=d.data.ayahs;
    show();
  });

  fetch("https://api.alquran.cloud/v1/surah/"+sura+"/tr.diyanet")
  .then(r=>r.json())
  .then(d=>{
    trData=d.data.ayahs;
  });

  let no=String(sura).padStart(3,'0');
  player.src="https://server8.mp3quran.net/afs/"+no+".mp3";
}

/* ayetleri göster */
function show(){
  let box=document.getElementById("ayetler");
  box.innerHTML="";

  data.forEach((a,i)=>{

    let key="fav_"+sura+"_"+i;
    let saved=localStorage.getItem(key);

    let heart = saved ? "❤️" : "🤍";

    box.innerHTML+=`
      <div class="ayet" id="a${i}">
        <div style="font-size:22px">${a.text}</div>
        <div style="color:#ccc">${trData[i]?.text || ""}</div>
        <span class="heart" onclick="fav(${i})" id="h${i}">${heart}</span>
      </div>
    `;
  });
}

/* başlat */
function startPlay(){
  player.play();

  player.onloadedmetadata=()=>{

    let perAyah=player.duration/data.length;

    clearInterval(interval);

    interval=setInterval(()=>{

      document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("active"));

      let el=document.getElementById("a"+currentIndex);
      if(el){
        el.classList.add("active");
        el.scrollIntoView({behavior:"smooth",block:"center"});
      }

      currentIndex++;

    },perAyah*1000);
  };
}

/* duraklat */
function pausePlay(){
  player.pause();
  clearInterval(interval);
}

/* favori ekle */
function fav(i){

  let key="fav_"+sura+"_"+i;

  if(localStorage.getItem(key)){
    localStorage.removeItem(key);
  }else{
    localStorage.setItem(key,JSON.stringify({
      sura:sura,
      suraName:document.getElementById("sure").selectedOptions[0].text,
      ayet:i+1,
      ar:data[i].text,
      tr:trData[i].text
    }));
  }

  show(); // kalp güncelle
}

/* favori liste */
function showFav(){
  let box=document.getElementById("favList");
  box.innerHTML="<h2>❤️ Favori Ayetler</h2>";

  for(let i in localStorage){
    if(i.startsWith("fav_")){
      let d=JSON.parse(localStorage[i]);

      box.innerHTML+=`
      <div class="favBox">

        <b>${d.suraName}</b><br>
        Ayet ${d.ayet}<br><br>

        <div>${d.ar}</div>
        <div style="color:#ccc">${d.tr}</div><br>

        <button onclick="delFav('${i}')">❌ Sil</button>

      </div>
      `;
    }
  }
}

function delFav(k){
  localStorage.removeItem(k);
  showFav();
}
</script>

</body>
</html>
