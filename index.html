<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Kuran Dinle PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background: linear-gradient(#000000,#0a1a2f);
}

select,input,button{
  padding:10px;
  margin:6px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

.ayet{
  padding:15px;
  border-bottom:1px solid #222;
}

.active{
  background:yellow;
  color:black;
}

.ar{font-size:26px;}
.tr{font-size:14px;color:#aaa;}

.kalp{font-size:20px;cursor:pointer;}
</style>
</head>

<body>

<h1>KURAN DİNLE PRO</h1>

<select id="sure"></select><br>

Başlangıç:
<input type="number" id="start" value="1"><br>

<label>
<input type="checkbox" id="auto"> Otomatik geç
</label><br>

<button onclick="load()">Yükle</button>
<button onclick="startPlay()">▶ Başlat</button>
<button onclick="pausePlay()">⏸ Duraklat</button>

<div id="list"></div>

<audio id="p"></audio>

<script>

let data=[];
let sura=1;
let current=0;

const p=document.getElementById("p");

// SURELER
fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(d=>{
  d.data.forEach(s=>{
    let o=document.createElement("option");
    o.value=s.number;
    o.textContent=s.number+". "+s.englishName;
    sure.appendChild(o);
  });

  loadLast(); // 🔥 AÇILINCA DEVAM ET
});

// KAYIT YÜKLE
function loadLast(){
  let s = localStorage.getItem("sura");
  let a = localStorage.getItem("ayet");
  let t = localStorage.getItem("time");

  if(s){
    sura = parseInt(s);
    document.getElementById("sure").value = sura;

    load();

    setTimeout(()=>{
      current = parseInt(a || 0);
      startPlay();

      if(t){
        p.currentTime = parseFloat(t);
      }
    },1000);
  }
}

// YÜKLE
function load(){

  sura = document.getElementById("sure").value;

  Promise.all([
    fetch(`https://api.alquran.cloud/v1/surah/${sura}`).then(r=>r.json()),
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/tr.diyanet`).then(r=>r.json())
  ])
  .then(([ar,tr])=>{

    data = ar.data.ayahs;

    let list = document.getElementById("list");
    list.innerHTML="";

    data.forEach((a,x)=>{

      let fav = localStorage.getItem("fav_"+sura+"_"+x)=="1";

      let div=document.createElement("div");
      div.className="ayet";
      div.id="a"+x;

      div.innerHTML=`
        <div class="ar">${a.text}</div>
        <div class="tr">${tr.data.ayahs[x].text}</div>
        <div class="kalp" onclick="favToggle(event,${x})">
          ${fav?"❤️":"🤍"}
        </div>
      `;

      list.appendChild(div);
    });

  });
}

// FAVORİ
function favToggle(e,x){
  e.stopPropagation();

  let key="fav_"+sura+"_"+x;

  if(localStorage.getItem(key)){
    localStorage.removeItem(key);
  }else{
    localStorage.setItem(key,"1");
  }

  let el=document.getElementById("a"+x).querySelector(".kalp");
  el.innerHTML = localStorage.getItem(key) ? "❤️" : "🤍";
}

// BAŞLAT
function startPlay(){

  sura = document.getElementById("sure").value;

  let no = String(sura).padStart(3,'0');

  p.src = `https://server8.mp3quran.net/afs/${no}.mp3`;

  p.play();

  highlight();
}

// DURAKLAT
function pausePlay(){
  p.pause();
}

// AYET TAKİP (yaklaşık süre bölme)
function highlight(){

  if(!data.length) return;

  let duration = p.duration || 1;
  let per = duration / data.length;

  current = Math.floor(p.currentTime / per);

  document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("active"));

  let el = document.getElementById("a"+current);

  if(el){
    el.classList.add("active");
    el.scrollIntoView({behavior:"smooth",block:"center"});
  }

  // 🔥 KAYDET
  localStorage.setItem("sura",sura);
  localStorage.setItem("ayet",current);
  localStorage.setItem("time",p.currentTime);

  requestAnimationFrame(highlight);
}

// SONRAKİ SURE
p.onended = function(){

  if(!document.getElementById("auto").checked) return;

  sura++;

  if(sura>114) return;

  document.getElementById("sure").value = sura;

  load();

  setTimeout(()=>{
    startPlay();
  },1000);
};

</script>

</body>
</html>
