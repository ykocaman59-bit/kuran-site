<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Kuran Dinle PRO+</title>

<style>
body{
  margin:0;
  color:white;
  text-align:center;
  font-family:Arial;
  background:url("https://images.unsplash.com/photo-1584551246679-0daf3d275d0f") no-repeat center;
  background-size:cover;

  user-select:none;
  -webkit-user-select:none;
}

.overlay{
  background:rgba(0,0,0,0.85);
  min-height:100vh;
}

select,input,button{
  padding:12px;
  margin:6px;
  font-size:16px;
  border-radius:12px;
  border:none;
}

.ayet{
  padding:18px;
  border-bottom:1px solid #333;
}

.active{
  background:yellow;
  color:black;
}

.ar{font-size:26px;}
.tr{font-size:14px;color:#ccc;}

.kalp{font-size:22px;cursor:pointer;}

#favPage{display:none;}
</style>
</head>

<body>
<div class="overlay">

<h1>KURAN DİNLE PRO+</h1>

<button onclick="showMain()">📖 Kur'an</button>
<button onclick="showFav()">❤️ Favoriler</button>

<div id="mainPage">

<select id="sure"></select><br>

Başlangıç:
<input type="number" id="start" value="1"><br>

<label><input type="checkbox" id="auto"> Otomatik geç</label><br>
<label><input type="checkbox" id="repeat"> Ayeti tekrar et</label><br>

<button onclick="load()">Yükle</button>

<button id="playBtn" onclick="startPlay()">▶ Başlat</button>
<button id="pauseBtn" onclick="pausePlay()" style="display:none;">⏸ Duraklat</button>

<div id="list"></div>

</div>

<div id="favPage">
<h2>❤️ Favoriler</h2>
<div id="favList"></div>
</div>

<audio id="p"></audio>

</div>

<script>

let dataAR=[], dataTR=[];
let current=0;
let sura=1;
let playing=false;

let lastPositions={}; // her sure için konum
let activeSurah=null; // 🔥 en son başlatılan sure

const p=document.getElementById("p");
const playBtn=document.getElementById("playBtn");
const pauseBtn=document.getElementById("pauseBtn");

const turkceSureler=["","Fatiha","Bakara","Ali İmran","Nisa","Maide","Enam","Araf","Enfal","Tevbe",
"Yunus","Hud","Yusuf","Ra'd","İbrahim","Hicr","Nahl","İsra","Kehf","Meryem",
"Taha","Enbiya","Hac","Müminun","Nur","Furkan","Şuara","Neml","Kasas","Ankebut",
"Rum","Lokman","Secde","Ahzab","Sebe","Fatır","Yasin","Saffat","Sad","Zümer",
"Mümin","Fussilet","Şura","Zuhruf","Duhan","Casiye","Ahkaf","Muhammed","Fetih","Hucurat",
"Kaf","Zariyat","Tur","Necm","Kamer","Rahman","Vakıa","Hadid","Mücadele","Haşr",
"Mümtehine","Saf","Cuma","Münafikun","Tegabun","Talak","Tahrim","Mülk","Kalem","Hakka",
"Mearic","Nuh","Cin","Müzzemmil","Müddessir","Kıyamet","İnsan","Mürselat","Nebe","Naziat",
"Abese","Tekvir","İnfitar","Mutaffifin","İnşikak","Buruc","Tarık","Ala","Gaşiye","Fecr",
"Beled","Şems","Leyl","Duha","İnşirah","Tin","Alak","Kadir","Beyyine","Zilzal",
"Adiyat","Karia","Tekasür","Asr","Hümeze","Fil","Kureyş","Maun","Kevser","Kafirun",
"Nasr","Tebbet","İhlas","Felak","Nas"];


// SURELER
fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(d=>{
  d.data.forEach(s=>{
    let o=document.createElement("option");
    o.value=s.number;
    o.textContent=s.number+". "+turkceSureler[s.number];
    sure.appendChild(o);
  });
});


// 🔥 SURE DEĞİŞİNCE DUR
sure.addEventListener("change", ()=>{
  if(playing){
    p.pause();
    playing=false;
    playBtn.style.display="inline-block";
    pauseBtn.style.display="none";
  }
});


// SAYFA
function showFav(){
  mainPage.style.display="none";
  favPage.style.display="block";
  loadFav();
}

function showMain(){
  mainPage.style.display="block";
  favPage.style.display="none";
}


// YÜKLE
function load(){

  sura = parseInt(sure.value);

  Promise.all([
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/ar.alafasy`).then(r=>r.json()),
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/tr.diyanet`).then(r=>r.json())
  ])
  .then(([ar,tr])=>{

    dataAR=ar.data.ayahs;
    dataTR=tr.data.ayahs;

    list.innerHTML="";

    dataAR.forEach((a,x)=>{

      let fav = localStorage.getItem("fav_"+sura+"_"+x)=="1";

      let div=document.createElement("div");
      div.className="ayet";
      div.id="a"+x;

      div.innerHTML=`
        <div class="ar">${a.text}</div>
        <div class="tr">${dataTR[x].text}</div>
        <div class="kalp" onclick="favToggle(event,${x})">
          ${fav?"❤️":"🤍"}
        </div>
      `;

      list.appendChild(div);
    });
  });
}


// FAVORİ
function favToggle(e,x){
  e.stopPropagation();
  let key="fav_"+sura+"_"+x;

  if(localStorage.getItem(key)) localStorage.removeItem(key);
  else localStorage.setItem(key,"1");
}


// FAVORİLER
async function loadFav(){

  favList.innerHTML="";

  for(let i=1;i<=114;i++){

    let [ar,tr]=await Promise.all([
      fetch(`https://api.alquran.cloud/v1/surah/${i}/ar.alafasy`).then(r=>r.json()),
      fetch(`https://api.alquran.cloud/v1/surah/${i}/tr.diyanet`).then(r=>r.json())
    ]);

    for(let j=0;j<ar.data.ayahs.length;j++){

      if(localStorage.getItem("fav_"+i+"_"+j)){

        let div=document.createElement("div");
        div.className="ayet";

        div.innerHTML=`
          <b>${i}. ${turkceSureler[i]} - Ayet ${j+1}</b><br>
          <div class="ar">${ar.data.ayahs[j].text}</div>
          <div class="tr">${tr.data.ayahs[j].text}</div>
        `;

        favList.appendChild(div);
      }
    }
  }
}


// BAŞLAT
function startPlay(){

  // 🔥 farklı sure başlatıldıysa eskiyi sıfırla
  if(activeSurah !== sura){
    lastPositions[sura]=undefined;
  }

  activeSurah = sura;

  if(lastPositions[sura] !== undefined){
    current = lastPositions[sura];
  } else {
    current = document.getElementById("start").value - 1;
  }

  playing=true;
  playNext();

  playBtn.style.display="none";
  pauseBtn.style.display="inline-block";
}


// DURAKLAT
function pausePlay(){
  p.pause();
  playing=false;

  playBtn.style.display="inline-block";
  pauseBtn.style.display="none";
}


// OKUMA
function playNext(){

  if(current >= dataAR.length){
    nextSurah();
    return;
  }

  lastPositions[sura]=current;

  p.src = dataAR[current].audio;

  document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("active"));

  let aktif=document.getElementById("a"+current);
  if(aktif){
    aktif.classList.add("active");
    aktif.scrollIntoView({behavior:"smooth",block:"center"});
  }

  p.play().catch(()=>{});

  p.onended = ()=>{

    if(repeat.checked){
      playNext();
      return;
    }

    current++;
    playNext();
  };
}


// SONRAKİ
function nextSurah(){

  if(!auto.checked) return;

  sura++;
  if(sura>114) return;

  sure.value = sura;
  load();

  setTimeout(()=>{
    current=0;
    playNext();
  },800);
}

</script>

</body>
</html>
