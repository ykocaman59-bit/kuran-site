<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kuran Dinle</title>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: Arial;
}

button {
  padding: 10px;
  margin: 10px;
  font-size: 16px;
}

input {
  padding: 8px;
  width: 60px;
}

.ayet {
  padding: 10px;
}

.active {
  background: yellow;
  color: black;
}
</style>

</head>

<body>

<h1>KURAN DİNLE</h1>

<select id="sureSelect"></select>
<br><br>

Başlangıç ayeti: <input type="number" id="startAyet" value="1" min="1">

<br><br>

<button onclick="loadSurah()">Yükle</button>
<button onclick="playAudio()">Başlat</button>

<div id="ayetler"></div>

<br>
<audio id="player" controls></audio>

<script>

let ayetData = [];
let current = 0;

// SURELERİ ÇEK
fetch("https://api.alquran.cloud/v1/surah")
.then(res => res.json())
.then(data => {
  let select = document.getElementById("sureSelect");

  data.data.forEach(s => {
    let opt = document.createElement("option");
    opt.value = s.number;
    opt.innerText = s.number + ". " + s.englishName;
    select.appendChild(opt);
  });
});

// SURE YÜKLE
function loadSurah() {

  let no = document.getElementById("sureSelect").value;

  fetch(`https://api.alquran.cloud/v1/surah/${no}/ar.alafasy`)
  .then(res => res.json())
  .then(data => {

    ayetData = data.data.ayahs;

    let div = document.getElementById("ayetler");
    div.innerHTML = "";

    ayetData.forEach((a, i) => {
      let p = document.createElement("div");
      p.className = "ayet";
      p.id = "a" + i;
      p.innerText = (i+1) + ". " + a.text;
      div.appendChild(p);
    });

  });
}

// BAŞLAT
function playAudio() {

  let start = document.getElementById("startAyet").value;
  current = start - 1;

  playNext();
}

// AYET AYET OYNAT
function playNext() {

  if (current >= ayetData.length) return;

  let player = document.getElementById("player");

  player.src = ayetData[current].audio;

  // sarı yap
  document.querySelectorAll(".ayet").forEach(e => e.classList.remove("active"));
  let aktif = document.getElementById("a" + current);
  if (aktif) aktif.classList.add("active");

  player.play().catch(() => {});

  // BURASI ÖNEMLİ (düzeltme)
  player.onended = null;
  player.onended = function() {
    current++;
    playNext();
  };
}

</script>

</body>
</html>
