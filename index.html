<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Kuran Dinle PRO</title>

<style>
body {
    background: #000;
    color: white;
    font-family: Arial;
    text-align: center;
    margin: 0;
    user-select: none; /* KOPYALAMA KAPALI */
}

h1 { margin-top:20px; }

.controls {
    margin: 15px;
}

/* SADECE BUTONLAR TIKLANABİLİR */
button, select, input {
    user-select: none;
    touch-action: manipulation;
}

button {
    padding:10px;
    margin:5px;
    font-size:16px;
}

.ayet {
    padding:10px;
}

.active {
    background: yellow;
    color: black;
}

/* METİN TIKLANAMAZ */
.ayet {
    pointer-events: none;
}

/* FAVORİ BUTONU TIKLANABİLİR */
.favBtn {
    pointer-events: auto;
    margin-left:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>KURAN DİNLE PRO</h1>

<div class="controls">

<select id="sure">
<option value="1">1. Fatiha</option>
<option value="2">2. Bakara</option>
<option value="3">3. Ali İmran</option>
<option value="4">4. Nisa</option>
</select>

<br><br>

Başlangıç ayeti:
<input type="number" id="ayetNo" value="1" min="1">

<br><br>

Hoca:
<select id="hoca">
<option value="Alafasy_128kbps">Alafasy</option>
<option value="Abdul_Basit_Murattal_128kbps">Abdul Basit</option>
<option value="Minshawi_Murattal_128kbps">Minshawi</option>
</select>

<br><br>

<label>
<input type="checkbox" id="autoNext" checked>
Otomatik geç
</label>

<br><br>

<button onclick="load()">Yükle</button>

<button onclick="togglePlay()">▶️ Başlat / ⏸️ Duraklat</button>

</div>

<div id="ayetler"></div>

<audio id="player"></audio>

<script>

let player = document.getElementById("player");
let currentAyet = 1;
let sureNo = 1;
let ayetList = [];
let playing = false;

/* AYET YÜKLE */
function load() {
    sureNo = document.getElementById("sure").value;
    currentAyet = parseInt(document.getElementById("ayetNo").value);

    fetch(`https://api.alquran.cloud/v1/surah/${sureNo}`)
    .then(res=>res.json())
    .then(data=>{
        ayetList = data.data.ayahs;
        render();
    });
}

/* AYETLERİ GÖSTER */
function render(){
    let div = document.getElementById("ayetler");
    div.innerHTML = "";

    ayetList.forEach(a=>{
        div.innerHTML += `
        <div class="ayet" id="a${a.numberInSurah}">
        ${a.numberInSurah}. ${a.text}
        <span class="favBtn" onclick="event.stopPropagation();fav(${a.numberInSurah})">❤️</span>
        </div>
        `;
    });
}

/* SES URL */
function getAudio(){
    let hoca = document.getElementById("hoca").value;
    return `https://server8.mp3quran.net/${hoca}/${String(sureNo).padStart(3,'0')}${String(currentAyet).padStart(3,'0')}.mp3`;
}

/* PLAY / PAUSE */
function togglePlay(){
    if(!playing){
        play();
    }else{
        player.pause();
        playing = false;
    }
}

function play(){
    player.src = getAudio();
    player.play();
    playing = true;
    highlight();
}

/* AYET BİTİNCE */
player.onended = ()=>{
    if(document.getElementById("autoNext").checked){
        currentAyet++;

        if(currentAyet <= ayetList.length){
            play();
        }
    }
};

/* HIGHLIGHT */
function highlight(){
    document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("active"));
    let el = document.getElementById("a"+currentAyet);
    if(el) el.classList.add("active");
}

/* FAVORİ */
function fav(no){
    let favs = JSON.parse(localStorage.getItem("fav") || "[]");

    let key = `${sureNo}-${no}`;

    if(favs.includes(key)){
        alert("Zaten ekli");
        return;
    }

    favs.push(key);
    localStorage.setItem("fav", JSON.stringify(favs));

    alert("Favoriye eklendi ❤️");
}

</script>

</body>
</html>
