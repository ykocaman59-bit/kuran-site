<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kuran Dinle PRO</title>

<style>
body {
  background: #000;
  color: white;
  text-align: center;
  font-family: Arial;
  margin: 0;
  user-select: none;
}

h1 {
  margin-top: 20px;
}

select, input, button {
  padding: 10px;
  margin: 8px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
}

button {
  cursor: pointer;
}

.ayet {
  padding: 12px;
  font-size: 20px;
}

.arapca {
  font-size: 26px;
  margin-bottom: 5px;
}

.meal {
  font-size: 14px;
  color: #aaa;
}

.active {
  background: yellow;
  color: black;
}
</style>
</head>

<body>

<h1>KURAN DİNLE PRO</h1>

<select id="sureSelect"></select>

<br>

Başlangıç ayeti:
<input type="number" id="startAyet" value="1" min="1">

<br>

<label>
<input type="checkbox" id="autoNext">
Otomatik sure geç
</label>

<br>

<button onclick="loadSurah()">Yükle</button>
<button id="playBtn" onclick="togglePlay()">▶ Başlat</button>

<div id="ayetler"></div>

<audio id="player"></audio>

<script>

let ayetler = [];
let current = 0;
let currentSurah = 1;
let player = document.getElementById("player");
let playing = false;

// SURELERİ ÇEK
fetch("https://api.alquran.cloud/v1/surah")
.then(r => r.json())
.then(d => {
  let select = document.getElementById("sureSelect");

  d.data.forEach(s => {
    let opt = document.createElement("option");
    opt.value = s.number;
    opt.textContent = s.number + ". " + s.englishName;
    select.appendChild(opt);
  });
});

// SURE YÜKLE (ARAPÇA + TÜRKÇE)
function loadSurah(){

  currentSurah = document.getElementById("sureSelect").value;

  Promise.all([
    fetch(`https://api.alquran.cloud/v1/surah/${currentSurah}/ar.alafasy`).then(r=>r.json()),
    fetch(`https://api.alquran.cloud/v1/surah/${currentSurah}/tr.diyanet`).then(r=>r.json())
  ])
  .then(([ar, tr]) => {

    ayetler = ar.data.ayahs;

    let div = document.getElementById("ayetler");
    div.innerHTML = "";

    ayetler.forEach((a, i) => {

      let el = document.createElement("div");
      el.className = "ayet";
      el.id = "a" + i;

      el.innerHTML = `
        <div class="arapca">${a.text}</div>
        <div class="meal">${tr.data.ayahs[i].text}</div>
      `;

      div.appendChild(el);
    });

    player.src = "";
    current = 0;
    document.getElementById("playBtn").innerHTML = "▶ Başlat";

  });
}

// TEK BUTON (PLAY / PAUSE)
function togglePlay(){

  if(player.src == ""){
    let start = document.getElementById("startAyet").value;
    current = start - 1;
    playNext();
    return;
  }

  if(player.paused){
    player.play();
    document.getElementById("playBtn").innerHTML = "⏸ Duraklat";
  }else{
    player.pause();
    document.getElementById("playBtn").innerHTML = "▶ Başlat";
  }
}

// AYET OYNAT
function playNext(){

  if(current >= ayetler.length){
    nextSurah();
    return;
  }

  player.src = ayetler[current].audio;

  document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("active"));

  let aktif = document.getElementById("a"+current);
  if(aktif){
    aktif.classList.add("active");
    aktif.scrollIntoView({behavior:"smooth", block:"center"});
  }

  player.play().catch(()=>{});

  document.getElementById("playBtn").innerHTML = "⏸ Duraklat";

  player.onended = () => {
    current++;
    playNext();
  };
}

// SONRAKİ SURE
function nextSurah(){

  if(!document.getElementById("autoNext").checked) return;

  currentSurah++;

  if(currentSurah > 114) return;

  document.getElementById("sureSelect").value = currentSurah;

  loadSurah();

  setTimeout(()=>{
    current = 0;
    playNext();
  }, 1200);
}

</script>

</body>
</html>
