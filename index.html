<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Kuran Dinle PRO</title>

<style>
body {
  background:#000;
  color:white;
  text-align:center;
  font-family:Arial;
  user-select:none;
}

button, select, input {
  padding:8px;
  margin:5px;
  font-size:16px;
}

.ayet {
  padding:10px;
  pointer-events:none;
}

.active {
  background:yellow;
  color:black;
}

.fav {
  pointer-events:auto;
  cursor:pointer;
  font-size:18px;
}
</style>
</head>

<body>

<h2>KURAN DİNLE PRO</h2>

<select id="sure"></select><br>

Başlangıç ayeti:
<input type="number" id="start" value="1"><br>

<label>
<input type="checkbox" id="autoNext" checked>
Otomatik geç
</label><br>

<button onclick="load()">Yükle</button>
<button onclick="togglePlay()">▶ Başlat / ⏸</button>

<div id="ayetler"></div>

<audio id="player"></audio>

<script>

let player = document.getElementById("player");
let ayetList = [];
let current = 0;
let playing = false;
let favs = JSON.parse(localStorage.getItem("fav")||"[]");

// SURELER
fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(d=>{
  let s=document.getElementById("sure");
  d.data.forEach(x=>{
    let o=document.createElement("option");
    o.value=x.number;
    o.innerText=x.number+". "+x.englishName;
    s.appendChild(o);
  });
});

// YÜKLE
function load(){
  let sure=document.getElementById("sure").value;
  let start=parseInt(document.getElementById("start").value)-1;

  fetch(`https://api.alquran.cloud/v1/surah/${sure}/ar.alafasy`)
  .then(r=>r.json())
  .then(d=>{
    ayetList=d.data.ayahs;
    current=start>=0?start:0;
    render();
  });
}

// AYETLERİ GÖSTER
function render(){
  let div=document.getElementById("ayetler");
  div.innerHTML="";

  ayetList.forEach((a,i)=>{
    let key=a.number;

    let heart = favs.includes(key) ? "❤️" : "🤍";

    div.innerHTML += `
      <div class="ayet" id="a${i}">
        ${i+1}. ${a.text}
        <span class="fav" onclick="event.stopPropagation();toggleFav(${key})">${heart}</span>
      </div>
    `;
  });
}

// PLAY
function play(){
  if(!ayetList.length) return;

  let audio=ayetList[current].audio;
  player.src=audio;
  player.play();
  playing=true;

  highlight();

  localStorage.setItem("kuran", JSON.stringify({
    sure: document.getElementById("sure").value,
    ayet: current
  }));
}

// TOGGLE
function togglePlay(){
  if(!playing){
    play();
  }else{
    player.pause();
    playing=false;
  }
}

// AYET BİTİNCE
player.onended=()=>{
  current++;

  if(current>=ayetList.length){
    if(document.getElementById("autoNext").checked){
      current=0;
    }else return;
  }

  play();
};

// HIGHLIGHT
function highlight(){
  document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("active"));
  let el=document.getElementById("a"+current);
  if(el) el.classList.add("active");
}

// FAVORİ
function toggleFav(id){
  if(favs.includes(id)){
    favs = favs.filter(x=>x!==id);
  }else{
    favs.push(id);
  }
  localStorage.setItem("fav", JSON.stringify(favs));
  render();
}

// KALDIĞI YER
window.onload=()=>{
  let k=JSON.parse(localStorage.getItem("kuran"));
  if(k){
    document.getElementById("sure").value=k.sure;

    fetch(`https://api.alquran.cloud/v1/surah/${k.sure}/ar.alafasy`)
    .then(r=>r.json())
    .then(d=>{
      ayetList=d.data.ayahs;
      current=k.ayet||0;
      render();
    });
  }
};

</script>

</body>
</html>
