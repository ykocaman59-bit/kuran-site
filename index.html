<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kuran Dinle PRO</title><style>
body{
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
    user-select:none;
}
.ayet{padding:10px;margin:10px;}
.aktif{background:yellow;color:black;}
button,select,input{padding:10px;margin:5px;}
.kalp{cursor:pointer;font-size:18px;}
</style></head><body><h2>KURAN DİNLE PRO</h2><select id="sure"></select><br>
Başlangıç ayeti:
<input type="number" id="baslangic" value="1"><br>

🎧 Hoca:
<select id="hoca">

<option value="ar.alafasy">Alafasy</option>
<option value="ar.husary">Husary</option>
<option value="ar.minshawi">Minshawi</option>
</select><br><label><input type="checkbox" id="auto" checked> Otomatik geç</label><br>

<button onclick="yukle()">Yükle</button>
<button onclick="baslat()">▶ Başlat / ⏸</button>

<div id="liste"></div><audio id="player"></audio>

<script>

let sure=1;
let ayet=1;
let data=[];
let playing=false;

const player=document.getElementById("player");

// SURE İSİMLERİ
const sureler=[
"Al-Faatiha","Al-Baqara","Aal-i-Imraan","An-Nisaa","Al-Maaida",
"Al-An'aam","Al-A'raaf","Al-Anfaal","At-Tawba","Yunus","Hud","Yusuf"
];

let s=document.getElementById("sure");
sureler.forEach((x,i)=>{
let o=document.createElement("option");
o.value=i+1;
o.text=(i+1)+". "+x;
s.appendChild(o);
});

// YÜKLE
async function yukle(){
sure=parseInt(document.getElementById("sure").value);
ayet=parseInt(document.getElementById("baslangic").value);

// ARAPÇA (DOĞRU)
let arapca=await fetch(`https://api.alquran.cloud/v1/surah/${sure}/quran-uthmani`).then(r=>r.json());

// TÜRKÇE
let meal=await fetch(`https://api.alquran.cloud/v1/surah/${sure}/tr.diyanet`).then(r=>r.json());

data=arapca.data.ayahs.map((a,i)=>({
ar:a.text,
tr:meal.data.ayahs[i].text,
no:a.numberInSurah
}));

goster();
}

// GÖSTER
function goster(){
let div=document.getElementById("liste");
div.innerHTML="";

data.forEach(a=>{
let key="fav_"+sure+"_"+a.no;
let fav=localStorage.getItem(key);

let d=document.createElement("div");
d.className="ayet";
d.innerHTML=`
<b>${a.no}. ${a.ar}</b><br>
<small>${a.tr}</small>
<span class="kalp" onclick="favToggle(${a.no})">
${fav?"❤️":"🤍"}
</span>
`;
div.appendChild(d);
});
}

// FAVORİ
function favToggle(no){
let key="fav_"+sure+"_"+no;
if(localStorage.getItem(key)){
localStorage.removeItem(key);
}else{
localStorage.setItem(key,1);
}
goster();
}

// BAŞLAT
function baslat(){
if(!playing){
playing=true;
oynat();
}else{
player.pause();
playing=false;
}
}

// OYNAT (DÜZELTİLDİ)
function oynat(){

// GLOBAL AYET NUMARASI
let globalAyet = (sure==1) ? ayet : data[ayet-1].no + (sure-1)*1000;

// DOĞRU AUDIO
let url=`https://cdn.islamic.network/quran/audio/128/${document.getElementById("hoca").value}/${globalAyet}.mp3`;

player.src=url;
player.play();

highlight();

player.onended=()=>{
if(document.getElementById("auto").checked){
ayet++;
if(ayet<=data.length){
oynat();
}
}
};
}

// AKTİF AYET
function highlight(){
let list=document.querySelectorAll(".ayet");
list.forEach(x=>x.classList.remove("aktif"));

if(list[ayet-1]){
list[ayet-1].classList.add("aktif");
}
}

</script></body>
</html>
