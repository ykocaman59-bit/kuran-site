<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kuran Dinle PRO</title><style>
body{
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
    margin:0;
    user-select:none;
    touch-action:manipulation;
}

h1{margin-top:20px;}

select,input,button{
    padding:10px;
    margin:5px;
    font-size:16px;
}

.ayet{
    margin:15px;
    font-size:18px;
}

.arapca{
    font-size:22px;
    direction:rtl;
}

.aktif{
    background:yellow;
    color:black;
}

.kalp{
    cursor:pointer;
    font-size:20px;
}
</style></head><body><h1>KURAN DİNLE PRO</h1><select id="sure"></select><br>

Başlangıç ayeti:
<input type="number" id="baslangic" value="1"><br>

Hoca:
<select id="hoca">

<option value="ar.alafasy">Alafasy</option>
<option value="ar.husary">Husary</option>
<option value="ar.minshawi">Minshawi</option>
</select><br><label><input type="checkbox" id="otomatik" checked> Otomatik geç</label><br>

<button onclick="yukle()">Yükle</button>
<button onclick="baslat()">▶ Başlat</button>

<div id="liste"></div><audio id="player"></audio>

<script>

let sureNo = 1;
let ayetler = [];
let current = 0;

const sureSelect = document.getElementById("sure");
const player = document.getElementById("player");

// SURE LİSTESİ
const sureler = [
"Al-Faatiha","Al-Baqara","Aal-i-Imraan","An-Nisaa","Al-Maaida",
"Al-An'aam","Al-A'raaf","Al-Anfaal","At-Tawba","Yunus","Hud","Yusuf"
];

sureler.forEach((s,i)=>{
    let opt = document.createElement("option");
    opt.value = i+1;
    opt.textContent = (i+1)+". "+s;
    sureSelect.appendChild(opt);
});

// VERİ ÇEK
async function yukle(){
    sureNo = sureSelect.value;

    let ar = await fetch(`https://api.alquran.cloud/v1/surah/${sureNo}`);
    let tr = await fetch(`https://api.alquran.cloud/v1/surah/${sureNo}/tr.diyanet`);

    let arData = await ar.json();
    let trData = await tr.json();

    ayetler = arData.data.ayahs.map((a,i)=>({
        ar:a.text,
        tr:trData.data.ayahs[i].text,
        no:a.numberInSurah
    }));

    listeyiYaz();
}

// EKRANA YAZ
function listeyiYaz(){
    let div = document.getElementById("liste");
    div.innerHTML="";

    ayetler.forEach((a,i)=>{
        div.innerHTML += `
        <div class="ayet" id="a${i}">
            <div class="arapca">${a.no}. ${a.ar}</div>
            <div>${a.tr}</div>
            <span class="kalp" onclick="fav(${i},this)">🤍</span>
        </div>`;
    });
}

// FAVORİ
function fav(i,el){
    el.textContent = el.textContent=="🤍" ? "❤️" : "🤍";
}

// BAŞLAT
function baslat(){
    current = parseInt(document.getElementById("baslangic").value) - 1;
    oku();
}

// OKUMA
function oku(){

    if(current >= ayetler.length) return;

    document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("aktif"));
    document.getElementById("a"+current).classList.add("aktif");

    let hoca = document.getElementById("hoca").value;

    // DOĞRU AYET NUMARASI
    let ayetNo = ayetler[current].no.toString().padStart(3,'0');
    let sureStr = sureNo.toString().padStart(3,'0');

    player.src = `https://cdn.islamic.network/quran/audio/128/${hoca}/${sureStr}${ayetNo}.mp3`;

    player.play();

    player.onended = ()=>{
        if(document.getElementById("otomatik").checked){
            current++;
            oku();
        }
    };
}

</script></body>
</html>
