<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Kuran Dinle PRO+</title>

<style>
body{
  margin:0;
  color:white;
  text-align:center;
  font-family:Arial;
  background:url("https://images.unsplash.com/photo-1584551246679-0daf3d275d0f") no-repeat center;
  background-size:cover;
}

.overlay{
  background:rgba(0,0,0,0.85);
  min-height:100vh;
  padding-bottom:40px;
}

select,input,button{
  padding:12px;
  margin:6px;
  font-size:16px;
  border-radius:12px;
  border:none;
}

.ayet{
  padding:18px;
  border-bottom:1px solid #333;
}

.active{
  background:yellow;
  color:black;
}

.ar{font-size:26px;}
.tr{font-size:14px;color:#ccc;}

.kalp{font-size:22px;cursor:pointer;}

#favPage{display:none;}
</style>
</head>

<body>
<div class="overlay">

<h1>KURAN DİNLE PRO+</h1>

<button onclick="showMain()">📖 Kur'an</button>
<button onclick="showFav()">❤️ Favoriler</button>

<div id="mainPage">

<select id="sure"></select><br>

Başlangıç:
<input type="number" id="start" value="1"><br>

<label>
<input type="checkbox" id="auto"> Otomatik geç
</label><br>

<button onclick="load()">Yükle</button>
<button onclick="startPlay()">▶ Başlat</button>
<button onclick="pausePlay()">⏸ Duraklat</button>

<div id="list"></div>

</div>

<div id="favPage">
<h2>❤️ Favoriler</h2>
<div id="favList"></div>
</div>

<audio id="p"></audio>

</div>

<script>

let dataAR=[];
let dataTR=[];
let current=0;
let sura=1;
let playing=false;

const p=document.getElementById("p");

// SURELER
fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(d=>{
  d.data.forEach(s=>{
    let o=document.createElement("option");
    o.value=s.number;
    o.textContent=s.number+". "+s.englishName;
    sure.appendChild(o);
  });
});

// SAYFA
function showFav(){
  document.getElementById("mainPage").style.display="none";
  document.getElementById("favPage").style.display="block";
  loadFav();
}

function showMain(){
  document.getElementById("mainPage").style.display="block";
  document.getElementById("favPage").style.display="none";
}

// YÜKLE
function load(){

  sura = document.getElementById("sure").value;

  Promise.all([
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/ar.alafasy`).then(r=>r.json()),
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/tr.diyanet`).then(r=>r.json())
  ])
  .then(([ar,tr])=>{

    dataAR = ar.data.ayahs;
    dataTR = tr.data.ayahs;

    let list=document.getElementById("list");
    list.innerHTML="";

    dataAR.forEach((a,x)=>{

      let fav = localStorage.getItem("fav_"+sura+"_"+x)=="1";

      let div=document.createElement("div");
      div.className="ayet";
      div.id="a"+x;

      div.innerHTML=`
        <div class="ar">${a.text}</div>
        <div class="tr">${dataTR[x].text}</div>
        <div class="kalp" id="kalp_${sura}_${x}" onclick="favToggle(event,${x})">
          ${fav?"❤️":"🤍"}
        </div>
      `;

      list.appendChild(div);
    });

  });
}

// FAVORİ EKLE
function favToggle(e,x){
  e.stopPropagation();

  let key="fav_"+sura+"_"+x;

  if(localStorage.getItem(key)){
    localStorage.removeItem(key);
  }else{
    localStorage.setItem(key,"1");
  }

  updateKalp(sura,x);
}

// KALP GÜNCELLE
function updateKalp(s,a){
  let el=document.getElementById("kalp_"+s+"_"+a);
  if(el){
    el.innerHTML = localStorage.getItem("fav_"+s+"_"+a) ? "❤️" : "🤍";
  }
}

// FAVORİ LİSTESİ (ARTIK AYET METNİ VAR)
async function loadFav(){

  let favList=document.getElementById("favList");
  favList.innerHTML="";

  for(let i=1;i<=114;i++){

    let found=false;

    for(let j=0;j<300;j++){
      if(localStorage.getItem("fav_"+i+"_"+j)){
        found=true;
        break;
      }
    }

    if(!found) continue;

    // API çek
    let [ar,tr] = await Promise.all([
      fetch(`https://api.alquran.cloud/v1/surah/${i}/ar.alafasy`).then(r=>r.json()),
      fetch(`https://api.alquran.cloud/v1/surah/${i}/tr.diyanet`).then(r=>r.json())
    ]);

    for(let j=0;j<ar.data.ayahs.length;j++){

      if(localStorage.getItem("fav_"+i+"_"+j)){

        let div=document.createElement("div");
        div.className="ayet";

        div.innerHTML=`
          <b>Sure ${i} - Ayet ${j+1}</b><br>
          <div class="ar">${ar.data.ayahs[j].text}</div>
          <div class="tr">${tr.data.ayahs[j].text}</div>
          <button onclick="removeFav(${i},${j})">❌ Kaldır</button>
        `;

        favList.appendChild(div);
      }
    }
  }
}

// FAVORİDEN SİL (ANINDA GÜNCEL)
function removeFav(s,a){
  localStorage.removeItem("fav_"+s+"_"+a);
  updateKalp(s,a); // ANA EKRAN DA GÜNCELLENİR
  loadFav();
}

// BAŞLAT (DEVAM EDER)
function startPlay(){

  if(playing){
    p.play();
    return;
  }

  let start = document.getElementById("start").value;
  current = start - 1;

  playing=true;

  playNext();
}

// DURAKLAT
function pausePlay(){
  p.pause();
}

// AYET AYET OKUMA
function playNext(){

  if(current >= dataAR.length){
    nextSurah();
    return;
  }

  p.src = dataAR[current].audio;

  document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("active"));

  let aktif=document.getElementById("a"+current);

  if(aktif){
    aktif.classList.add("active");
    aktif.scrollIntoView({behavior:"smooth",block:"center"});
  }

  p.play().catch(()=>{});

  p.onended = ()=>{
    current++;
    playNext();
  };
}

// SONRAKİ SURE
function nextSurah(){

  if(!document.getElementById("auto").checked) return;

  sura++;

  if(sura>114) return;

  document.getElementById("sure").value = sura;

  load();

  setTimeout(()=>{
    current=0;
    playNext();
  },1000);
}

</script>

</body>
</html>
