<script>

let dataAR=[], dataTR=[];
let current=0;
let sura=1;
let playing=false;

let lastPositions={};     // 🔥 sure bazlı kayıt
let activeSurah=null;     // 🔥 gerçekten başlatılan sure

const p=document.getElementById("p");
const playBtn=document.getElementById("playBtn");
const pauseBtn=document.getElementById("pauseBtn");

const autoBox=document.getElementById("auto");
const repeatBox=document.getElementById("repeat");
const repeatSurahBox=document.getElementById("repeatSurah");

// 🔥 TEK SEÇİM
autoBox.onchange=()=>{ if(autoBox.checked){repeatBox.checked=false;repeatSurahBox.checked=false;} };
repeatBox.onchange=()=>{ if(repeatBox.checked){autoBox.checked=false;repeatSurahBox.checked=false;} };
repeatSurahBox.onchange=()=>{ if(repeatSurahBox.checked){autoBox.checked=false;repeatBox.checked=false;} };

// 🔥 SURE DEĞİŞİNCE DUR
sure.onchange=()=>{
  if(playing){
    p.pause();
    playing=false;
    playBtn.style.display="inline-block";
    pauseBtn.style.display="none";
  }
};

// YÜKLE
function load(){
  sura=parseInt(sure.value);

  Promise.all([
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/ar.alafasy`).then(r=>r.json()),
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/tr.diyanet`).then(r=>r.json())
  ])
  .then(([ar,tr])=>{
    dataAR=ar.data.ayahs;
    dataTR=tr.data.ayahs;

    list.innerHTML="";

    dataAR.forEach((a,x)=>{
      let fav = localStorage.getItem("fav_"+sura+"_"+x)=="1";

      let div=document.createElement("div");
      div.className="ayet";
      div.id="a"+x;

      div.innerHTML=`
        <div class="ar">${a.text}</div>
        <div class="tr">${dataTR[x].text}</div>
        <div class="kalp" onclick="toggleFav(${sura},${x})">
          ${fav ? "❤️" : "🤍"}
        </div>
      `;

      list.appendChild(div);
    });

    // 🔥 sadece yükleme, current değiştirme
  });
}

// ▶ BAŞLAT (TAM FIX)
function startPlay(){

  // 🔥 Eğer aynı sure tekrar başlatılıyorsa
  if(activeSurah === sura){
    current = lastPositions[sura] ?? current;
  }else{
    // 🔥 yeni sure başlatıldıysa BAŞTAN
    current = document.getElementById("start").value - 1;
  }

  activeSurah = sura;

  playing=true;
  playNext();

  playBtn.style.display="none";
  pauseBtn.style.display="inline-block";
}

// ⏸ DURAKLAT
function pausePlay(){
  p.pause();
  playing=false;

  playBtn.style.display="inline-block";
  pauseBtn.style.display="none";
}

// 🔊 OKUMA
function playNext(){

  if(!dataAR.length) return;

  if(current>=dataAR.length){

    if(repeatSurahBox.checked){
      current=0;
      playNext();
      return;
    }

    if(autoBox.checked){
      sura++;
      if(sura>114) return;

      sure.value=sura;
      load();

      setTimeout(()=>{
        current=0;
        activeSurah=sura;
        playNext();
      },800);
    }

    return;
  }

  // 🔥 KAYDET
  lastPositions[sura]=current;

  p.src=dataAR[current].audio;

  document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("active"));

  let aktif=document.getElementById("a"+current);
  if(aktif){
    aktif.classList.add("active");
    aktif.scrollIntoView({behavior:"smooth",block:"center"});
  }

  p.play().catch(()=>{});

  p.onended=()=>{

    if(repeatBox.checked){
      playNext();
      return;
    }

    current++;
    playNext();
  };
}

// ❤️ FAVORİ
function toggleFav(s,a){
  let key="fav_"+s+"_"+a;

  if(localStorage.getItem(key)){
    localStorage.removeItem(key);
  }else{
    localStorage.setItem(key,"1");
  }

  load();
}

// ❤️ FAVORİ LİSTE
async function loadFav(){

  favList.innerHTML="";

  for(let i=1;i<=114;i++){

    let [ar,tr]=await Promise.all([
      fetch(`https://api.alquran.cloud/v1/surah/${i}/ar.alafasy`).then(r=>r.json()),
      fetch(`https://api.alquran.cloud/v1/surah/${i}/tr.diyanet`).then(r=>r.json())
    ]);

    for(let j=0;j<ar.data.ayahs.length;j++){

      if(localStorage.getItem("fav_"+i+"_"+j)){

        let div=document.createElement("div");
        div.className="ayet";

        div.innerHTML=`
          <b>${i}. ${turkceSureler[i]} - Ayet ${j+1}</b><br>
          <div class="ar">${ar.data.ayahs[j].text}</div>
          <div class="tr">${tr.data.ayahs[j].text}</div>
          <button onclick="removeFav(${i},${j})">❌ Sil</button>
        `;

        favList.appendChild(div);
      }
    }
  }
}

function removeFav(s,a){
  localStorage.removeItem("fav_"+s+"_"+a);
  loadFav();
  load();
}

</script>
