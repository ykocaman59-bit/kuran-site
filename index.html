<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kuran Dinle PRO</title><style>
body{
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
    margin:0;
    user-select:none;
}

.ayet{margin:15px;font-size:18px;}
.arapca{font-size:22px;direction:rtl;}
.aktif{background:yellow;color:black;}
</style></head><body><h2>KURAN DİNLE PRO</h2><select id="sure"></select><br>

Başlangıç:
<input type="number" id="baslangic" value="1"><br>

Hoca:
<select id="hoca">

<option value="Alafasy_128kbps">Alafasy</option>
<option value="Husary_128kbps">Husary</option>
<option value="Minshawy_Murattal_128kbps">Minshawi</option>
</select><br><label><input type="checkbox" id="otomatik" checked> Otomatik</label><br>

<button onclick="yukle()">Yükle</button>
<button onclick="baslat()">Başlat</button>

<div id="liste"></div><audio id="player"></audio>

<script>

let ayetler = [];
let current = 0;
let sureNo = 1;

const player = document.getElementById("player");

// SURELER
const sureler = ["Fatiha","Bakara","Ali İmran","Nisa","Maide","Enam","Araf"];

sureler.forEach((s,i)=>{
    let o=document.createElement("option");
    o.value=i+1;
    o.text=(i+1)+". "+s;
    document.getElementById("sure").appendChild(o);
});

// VERİ
async function yukle(){
    sureNo = document.getElementById("sure").value;

    let ar = await fetch(`https://api.alquran.cloud/v1/surah/${sureNo}`);
    let tr = await fetch(`https://api.alquran.cloud/v1/surah/${sureNo}/tr.diyanet`);

    let arData = await ar.json();
    let trData = await tr.json();

    ayetler = arData.data.ayahs.map((a,i)=>({
        ar:a.text,
        tr:trData.data.ayahs[i].text,
        no:a.numberInSurah
    }));

    yaz();
}

// YAZ
function yaz(){
    let div=document.getElementById("liste");
    div.innerHTML="";

    ayetler.forEach((a,i)=>{
        div.innerHTML += `
        <div class="ayet" id="a${i}">
            <div class="arapca">${a.no}. ${a.ar}</div>
            <div>${a.tr}</div>
        </div>`;
    });
}

// BAŞLAT
function baslat(){
    current = parseInt(document.getElementById("baslangic").value) - 1;
    oku();
}

// OKU
function oku(){

    if(current >= ayetler.length) return;

    document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("aktif"));
    document.getElementById("a"+current).classList.add("aktif");

    let hoca = document.getElementById("hoca").value;

    let sure = String(sureNo).padStart(3,'0');
    let ayet = String(ayetler[current].no).padStart(3,'0');

    // ✅ YENİ AUDIO KAYNAK (GARANTİ)
    player.src = `https://everyayah.com/data/${hoca}/${sure}${ayet}.mp3`;

    player.play().catch(()=>{
        alert("Ses başlatılamadı. Ekrana bir kere dokun ve tekrar başlat.");
    });

    player.onended = ()=>{
        if(document.getElementById("otomatik").checked){
            current++;
            oku();
        }
    };

    // ❗ HATA OLURSA ATLA
    player.onerror = ()=>{
        current++;
        oku();
    };
}

</script></body>
</html>
