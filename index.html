<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Kuran Dinle PRO</title>

<style>
body {background:#111;color:white;text-align:center;font-family:Arial;}
select,input,button {padding:8px;margin:5px;font-size:16px;}
.ayet {padding:10px;}
.active {background:yellow;color:black;}
.meal {font-size:13px;color:#aaa;}
.fav {color:gold;cursor:pointer;}
</style>
</head>

<body>

<h2>KURAN DİNLE PRO</h2>

<select id="sure"></select><br>

Başlangıç ayeti:
<input type="number" id="start" value="1" style="width:60px"><br>

🎧 Hoca:
<select id="hoca">
<option value="ar.alafasy">Alafasy</option>
<option value="ar.abdurrahmaansudais">Sudais</option>
<option value="ar.saoodshuraym">Shuraym</option>
</select><br>

<label>
<input type="checkbox" id="autoNext" checked>
Sonraki sureye otomatik geç
</label><br>

<button onclick="load()">Yükle</button>
<button onclick="togglePlay()" id="playBtn">▶ Başlat</button>

<div id="ayetler"></div>
<audio id="player"></audio>

<script>

let player=document.getElementById("player");
let playing=false;
let currentAyet=1;
let ayetList=[];
let currentSure=1;
let btn=document.getElementById("playBtn");

// SURELER
fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(data=>{
    let select=document.getElementById("sure");

    data.data.forEach(s=>{
        let opt=document.createElement("option");
        opt.value=s.number;
        opt.innerText=s.number+". "+s.englishName;
        select.appendChild(opt);
    });

    let saved=JSON.parse(localStorage.getItem("kuran"));
    if(saved){
        select.value=saved.sure;
        document.getElementById("start").value=saved.ayet;
    }
});

// YÜKLE
function load(){
    currentSure=parseInt(document.getElementById("sure").value);
    currentAyet=parseInt(document.getElementById("start").value);

    fetch(`https://api.alquran.cloud/v1/surah/${currentSure}/editions/quran-uthmani,tr.diyanet`)
    .then(r=>r.json())
    .then(data=>{
        ayetList=data.data[0].ayahs;
        let mealList=data.data[1].ayahs;

        let html="";
        ayetList.forEach((a,i)=>{
            html+=`
            <div class="ayet" id="a${i+1}">
            ${i+1}. ${a.text} 
            <span class="fav" onclick="fav(${i+1})">⭐</span>
            <div class="meal">${mealList[i].text}</div>
            </div>`;
        });

        document.getElementById("ayetler").innerHTML=html;
        playAyet();
    });
}

// AYET ÇAL (FIXLİ)
function playAyet(){
    highlight();

    let hoca=document.getElementById("hoca").value;

    // 🔥 DOĞRU AUDIO ID
    let ayetNo = String(currentSure).padStart(3,'0') + String(currentAyet).padStart(3,'0');

    let url=`https://cdn.islamic.network/quran/audio/128/${hoca}/${ayetNo}.mp3`;

    player.src=url;
    player.play();

    playing=true;
    btn.innerHTML="⏸ Duraklat";

    localStorage.setItem("kuran",JSON.stringify({
        sure:currentSure,
        ayet:currentAyet
    }));
}

// BUTON
function togglePlay(){
    if(!playing){
        player.play();
        btn.innerHTML="⏸ Duraklat";
        playing=true;
    }else{
        player.pause();
        btn.innerHTML="▶ Başlat";
        playing=false;
    }
}

// BİTİNCE
player.onended=function(){
    currentAyet++;

    if(currentAyet>ayetList.length){
        if(document.getElementById("autoNext").checked){
            currentSure++;
            currentAyet=1;
            document.getElementById("sure").value=currentSure;
            load();
        }
    }else{
        playAyet();
    }
}

// HIGHLIGHT
function highlight(){
    document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("active"));
    let el=document.getElementById("a"+currentAyet);
    if(el) el.classList.add("active");
}

// FAVORİ
function fav(a){
    let favs=JSON.parse(localStorage.getItem("fav")||"[]");
    favs.push({sure:currentSure,ayet:a});
    localStorage.setItem("fav",JSON.stringify(favs));
    alert("Favorilere eklendi ⭐");
}

</script>

</body>
</html>
