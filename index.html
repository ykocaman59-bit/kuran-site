<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Kuran Dinle PRO+</title>

<style>
body{
  margin:0;
  color:white;
  text-align:center;
  font-family:Arial;
  background:url("https://images.unsplash.com/photo-1584551246679-0daf3d275d0f") no-repeat center;
  background-size:cover;
  user-select:none;
}

.overlay{
  background:rgba(0,0,0,0.85);
  min-height:100vh;
  padding-bottom:40px;
}

select,input,button{
  padding:12px;
  margin:6px;
  font-size:16px;
  border-radius:12px;
  border:none;
}

.ayet{
  padding:18px;
  border-bottom:1px solid #333;
}

.active{
  background:yellow;
  color:black;
}

.ar{font-size:26px;}
.tr{font-size:14px;color:#ccc;}

.kalp{font-size:22px;cursor:pointer;}

#favPage{display:none;}
</style>
</head>

<body>
<div class="overlay">

<h1>KURAN DİNLE PRO+</h1>

<button onclick="showMain()">📖 Kur'an</button>
<button onclick="showFav()">❤️ Favoriler</button>

<div id="mainPage">

<select id="sure"></select><br>

Başlangıç:
<input type="number" id="start" value="1"><br>

<label><input type="checkbox" id="auto"> Otomatik geç</label>
<label><input type="checkbox" id="repeatAyet"> Ayeti tekrar et</label>
<label><input type="checkbox" id="repeatSure"> Sureyi tekrar et</label><br>

<button onclick="load()">Yükle</button>
<button onclick="togglePlay()" id="playBtn">▶ Başlat</button>

<div id="list"></div>

</div>

<div id="favPage">
<h2>❤️ Favoriler</h2>
<div id="favList"></div>
</div>

<audio id="p"></audio>

</div>

<script>

let dataAR=[];
let dataTR=[];
let current=0;
let sura=1;
let playing=false;

let lastPos={};

const p=document.getElementById("p");
const playBtn=document.getElementById("playBtn");

// TÜRKÇE SURELER
const turkceSureler=["","Fatiha","Bakara","Ali İmran","Nisa","Maide","Enam","Araf","Enfal","Tevbe",
"Yunus","Hud","Yusuf","Ra'd","İbrahim","Hicr","Nahl","İsra","Kehf","Meryem",
"Taha","Enbiya","Hac","Müminun","Nur","Furkan","Şuara","Neml","Kasas","Ankebut",
"Rum","Lokman","Secde","Ahzab","Sebe","Fatır","Yasin","Saffat","Sad","Zümer",
"Mümin","Fussilet","Şura","Zuhruf","Duhan","Casiye","Ahkaf","Muhammed","Fetih","Hucurat",
"Kaf","Zariyat","Tur","Necm","Kamer","Rahman","Vakıa","Hadid","Mücadele","Haşr",
"Mümtehine","Saf","Cuma","Münafikun","Tegabun","Talak","Tahrim","Mülk","Kalem","Hakka",
"Mearic","Nuh","Cin","Müzzemmil","Müddessir","Kıyamet","İnsan","Mürselat","Nebe","Naziat",
"Abese","Tekvir","İnfitar","Mutaffifin","İnşikak","Buruc","Tarık","Ala","Gaşiye","Fecr",
"Beled","Şems","Leyl","Duha","İnşirah","Tin","Alak","Kadir","Beyyine","Zilzal",
"Adiyat","Karia","Tekasür","Asr","Hümeze","Fil","Kureyş","Maun","Kevser","Kafirun",
"Nasr","Tebbet","İhlas","Felak","Nas"];

// SURELER
fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(d=>{
  d.data.forEach(s=>{
    let o=document.createElement("option");
    o.value=s.number;
    o.textContent=s.number+". "+turkceSureler[s.number];
    sure.appendChild(o);
  });
});

// TEK SEÇİM
auto.onchange=()=>{ if(auto.checked){repeatAyet.checked=false;repeatSure.checked=false;} }
repeatAyet.onchange=()=>{ if(repeatAyet.checked){auto.checked=false;repeatSure.checked=false;} }
repeatSure.onchange=()=>{ if(repeatSure.checked){auto.checked=false;repeatAyet.checked=false;} }

// SURE DEĞİŞİNCE DUR
sure.onchange=()=>{
  p.pause();
  playing=false;
  playBtn.innerHTML="▶ Başlat";
};

// SAYFA
function showFav(){
  mainPage.style.display="none";
  favPage.style.display="block";
  loadFav();
}
function showMain(){
  mainPage.style.display="block";
  favPage.style.display="none";
}

// YÜKLE
function load(){

  p.pause();
  playing=false;

  sura=document.getElementById("sure").value;
  current = lastPos[sura] ?? 0;

  Promise.all([
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/ar.alafasy`).then(r=>r.json()),
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/tr.diyanet`).then(r=>r.json())
  ])
  .then(([ar,tr])=>{

    dataAR=ar.data.ayahs;
    dataTR=tr.data.ayahs;

    list.innerHTML="";

    dataAR.forEach((a,x)=>{
      let fav=localStorage.getItem("fav_"+sura+"_"+x)=="1";

      let div=document.createElement("div");
      div.className="ayet";
      div.id="a"+x;

      div.innerHTML=`
        <div class="ar">${a.text}</div>
        <div class="tr">${dataTR[x].text}</div>
        <div class="kalp" id="kalp_${sura}_${x}" onclick="favToggle(event,${x})">
          ${fav?"❤️":"🤍"}
        </div>
      `;

      list.appendChild(div);
    });

    togglePlay();
  });
}

// FAVORİ TOGGLE (🔥 DÜZELTME BURADA)
function favToggle(e,x){
  e.stopPropagation();

  let key="fav_"+sura+"_"+x;
  let el=document.getElementById("kalp_"+sura+"_"+x);

  if(localStorage.getItem(key)){
    localStorage.removeItem(key);
    if(el) el.innerHTML="🤍";
  }else{
    localStorage.setItem(key,"1");
    if(el) el.innerHTML="❤️";
  }
}

// FAVORİ LİSTESİ
async function loadFav(){
  favList.innerHTML="";

  for(let i=1;i<=114;i++){
    for(let j=0;j<300;j++){

      if(localStorage.getItem("fav_"+i+"_"+j)){

        let [ar,tr]=await Promise.all([
          fetch(`https://api.alquran.cloud/v1/surah/${i}/ar.alafasy`).then(r=>r.json()),
          fetch(`https://api.alquran.cloud/v1/surah/${i}/tr.diyanet`).then(r=>r.json())
        ]);

        let div=document.createElement("div");
        div.className="ayet";

        div.innerHTML=`
          <b>${turkceSureler[i]} - Ayet ${j+1}</b><br>
          <div class="ar">${ar.data.ayahs[j].text}</div>
          <div class="tr">${tr.data.ayahs[j].text}</div>
          <button onclick="removeFav(${i},${j})">❌ Kaldır</button>
        `;

        favList.appendChild(div);
      }
    }
  }
}

// SİL
function removeFav(s,a){
  localStorage.removeItem("fav_"+s+"_"+a);
  loadFav();
}

// PLAY
function togglePlay(){
  if(!playing){
    playing=true;
    playBtn.innerHTML="⏸ Duraklat";
    playNext();
  }else{
    p.pause();
    playing=false;
    playBtn.innerHTML="▶ Başlat";
  }
}

// OKUMA
function playNext(){

  if(current>=dataAR.length){

    if(repeatSure.checked){
      current=0;
      playNext();
      return;
    }

    nextSurah();
    return;
  }

  lastPos[sura]=current;

  p.src=dataAR[current].audio;

  document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("active"));

  let aktif=document.getElementById("a"+current);
  if(aktif){
    aktif.classList.add("active");
    aktif.scrollIntoView({behavior:"smooth",block:"center"});
  }

  p.play().catch(()=>{});

  p.onended=()=>{

    if(repeatAyet.checked){
      playNext();
      return;
    }

    current++;
    playNext();
  };
}

// SONRAKİ
function nextSurah(){

  if(!auto.checked) return;

  sura++;
  if(sura>114) return;

  sure.value=sura;

  load();
}

</script>

</body>
</html>
