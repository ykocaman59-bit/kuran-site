<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kuran Dinle PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;

  background: url("https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Quran.jpg/800px-Quran.jpg") no-repeat center center fixed;
  background-size: cover;
}

.overlay{
  background: rgba(0,0,0,0.75);
  min-height:100vh;
  padding:15px;
}

select,input,button{
  padding:10px;
  margin:6px;
  border-radius:10px;
  border:none;
}

.ayet{
  padding:15px;
  border-bottom:1px solid #333;
}

.ar{font-size:24px;}
.tr{font-size:14px;color:#ccc;}

.active{
  background:yellow;
  color:black;
}

.kalp{font-size:20px;cursor:pointer;}

.favBox{
  background:#222;
  padding:10px;
  margin:10px;
  border-radius:10px;
}
</style>
</head>

<body>
<div class="overlay">

<h1>KURAN DİNLE PRO</h1>

<select id="sure"></select><br>

Başlangıç:
<input type="number" id="start" value="1"><br>

<label>
<input type="checkbox" id="auto"> Otomatik geç
</label><br>

<button onclick="load()">Yükle</button>
<button onclick="startPlay()">▶ Başlat</button>
<button onclick="pausePlay()">⏸ Duraklat</button>
<button onclick="showFav()">❤️ Favoriler</button>

<div id="list"></div>
<div id="favList"></div>

<audio id="p"></audio>

</div>

<script>

let data=[];
let trData=[];
let current=0;
let sura=1;

const p=document.getElementById("p");

// SURELER
fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(d=>{
  d.data.forEach(s=>{
    let o=document.createElement("option");
    o.value=s.number;
    o.textContent=s.number+". "+s.englishName;
    sure.appendChild(o);
  });
});

// YÜKLE
function load(){

  sura = document.getElementById("sure").value;

  Promise.all([
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/ar.alafasy`).then(r=>r.json()),
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/tr.diyanet`).then(r=>r.json())
  ])
  .then(([ar,tr])=>{

    data = ar.data.ayahs;
    trData = tr.data.ayahs;

    let list=document.getElementById("list");
    list.innerHTML="";
    document.getElementById("favList").innerHTML="";

    data.forEach((a,x)=>{

      let fav = localStorage.getItem("fav_"+sura+"_"+x)=="1";

      let div=document.createElement("div");
      div.className="ayet";
      div.id="a"+x;

      div.innerHTML=`
        <div class="ar">${a.text}</div>
        <div class="tr">${trData[x].text}</div>
        <div class="kalp" onclick="favToggle(event,${x})">
          ${fav?"❤️":"🤍"}
        </div>
      `;

      list.appendChild(div);
    });

  });
}

// FAVORİ EKLE
function favToggle(e,x){
  e.stopPropagation();

  let key="fav_"+sura+"_"+x;

  if(localStorage.getItem(key)){
    localStorage.removeItem(key);
  }else{
    localStorage.setItem(key,"1");
  }

  let el=document.getElementById("a"+x).querySelector(".kalp");
  el.innerHTML = localStorage.getItem(key) ? "❤️" : "🤍";
}

// FAVORİLERİ GÖSTER
function showFav(){

  let favList=document.getElementById("favList");
  favList.innerHTML="<h3>Favori Ayetler</h3>";

  for(let i=1;i<=114;i++){
    for(let j=0;j<300;j++){

      let key="fav_"+i+"_"+j;

      if(localStorage.getItem(key)){

        fetch(`https://api.alquran.cloud/v1/surah/${i}/tr.diyanet`)
        .then(r=>r.json())
        .then(d=>{

          let ayet = d.data.ayahs[j];

          if(!ayet) return;

          let div=document.createElement("div");
          div.className="favBox";

          div.innerHTML=`
          <b>${i}. Sure (${d.data.englishName}) - Ayet ${j+1}</b><br>
          ${ayet.text}<br>
          <button onclick="removeFav(${i},${j})">Sil</button>
          `;

          favList.appendChild(div);

        });

      }

    }
  }
}

// FAVORİ SİL
function removeFav(s,a){
  localStorage.removeItem("fav_"+s+"_"+a);
  showFav();
}

// BAŞLAT
function startPlay(){

  if(p.paused && p.currentTime>0){
    p.play();
    return;
  }

  let start = document.getElementById("start").value;
  current = start - 1;

  playNext();
}

// DURAKLAT
function pausePlay(){
  p.pause();
}

// AYET OYNAT
function playNext(){

  if(current>=data.length){
    nextSurah();
    return;
  }

  p.src = data[current].audio;
  p.load();

  document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("active"));

  let aktif=document.getElementById("a"+current);
  if(aktif) aktif.classList.add("active");

  if(aktif) aktif.scrollIntoView({behavior:"smooth",block:"center"});

  p.play();

  p.onended = ()=>{
    current++;
    playNext();
  };
}

// SONRAKİ SURE
function nextSurah(){

  if(!document.getElementById("auto").checked) return;

  sura++;

  if(sura>114) return;

  document.getElementById("sure").value=sura;

  load();

  setTimeout(()=>{
    current=0;
    playNext();
  },1000);
}

</script>
</body>
</html>
