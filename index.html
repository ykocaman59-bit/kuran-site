<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Kuran Dinle PRO</title>

<style>
body{
  margin:0;
  color:white;
  text-align:center;
  font-family:Arial;

  /* 🔥 ARKA PLAN */
  background: url("https://images.unsplash.com/photo-1542810634-71277d95dcbb") no-repeat center;
  background-size:cover;
}

.container{
  background: rgba(0,0,0,0.85);
  min-height:100vh;
  padding:10px;
}

select,input,button{
  padding:10px;
  margin:6px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

.ayet{
  padding:18px;
  border-bottom:1px solid #333;
}

.active{
  background:yellow;
  color:black;
}

.ar{
  font-size:26px;
}

.tr{
  font-size:14px;
  color:#bbb;
}

.kalp{
  font-size:22px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>KURAN DİNLE PRO</h1>

<select id="sure"></select><br>

Başlangıç:
<input type="number" id="start" value="1"><br>

<label>
<input type="checkbox" id="auto"> Otomatik geç
</label><br>

<button onclick="load()">Yükle</button>
<button onclick="startPlay()">▶ Başlat</button>
<button onclick="pausePlay()">⏸ Duraklat</button>
<button onclick="showFav()">❤️ Favoriler</button>

<div id="list"></div>

<audio id="p"></audio>

</div>

<script>

let data=[];
let current=0;
let sura=1;
let playing=false;

const p=document.getElementById("p");

// SURELER
fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(d=>{
  d.data.forEach(s=>{
    let o=document.createElement("option");
    o.value=s.number;
    o.textContent=s.number+". "+s.englishName;
    sure.appendChild(o);
  });
});

// YÜKLE
function load(){

  sura = document.getElementById("sure").value;

  Promise.all([
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/ar.alafasy`).then(r=>r.json()),
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/tr.diyanet`).then(r=>r.json())
  ])
  .then(([ar,tr])=>{

    data = ar.data.ayahs;

    let list=document.getElementById("list");
    list.innerHTML="";

    data.forEach((a,x)=>{

      let fav = localStorage.getItem("fav_"+sura+"_"+x)=="1";

      let div=document.createElement("div");
      div.className="ayet";
      div.id="a"+x;

      div.innerHTML=`
        <div class="ar">${a.text}</div>
        <div class="tr">${tr.data.ayahs[x].text}</div>
        <div class="kalp" onclick="favToggle(event,${x})">
          ${fav?"❤️":"🤍"}
        </div>
      `;

      list.appendChild(div);
    });

  });
}

// FAVORİ
function favToggle(e,x){
  e.stopPropagation();

  let key="fav_"+sura+"_"+x;

  if(localStorage.getItem(key)){
    localStorage.removeItem(key);
  }else{
    localStorage.setItem(key,"1");
  }

  let el=document.getElementById("a"+x).querySelector(".kalp");
  el.innerHTML = localStorage.getItem(key) ? "❤️" : "🤍";
}

// FAVORİ LİSTESİ
function showFav(){

  let list=document.getElementById("list");
  list.innerHTML="<h2>❤️ Favori Ayetler</h2>";

  for(let i=1;i<=114;i++){
    for(let j=0;j<300;j++){

      if(localStorage.getItem("fav_"+i+"_"+j)){

        let div=document.createElement("div");
        div.className="ayet";
        div.innerHTML=`
          Sure ${i} - Ayet ${j+1}
          <div class="kalp" onclick="removeFav(${i},${j})">❌ Sil</div>
        `;
        list.appendChild(div);
      }
    }
  }
}

// FAVORİ SİL
function removeFav(s,a){
  localStorage.removeItem("fav_"+s+"_"+a);
  showFav();
}

// BAŞLAT (DEVAM DESTEKLİ)
function startPlay(){

  if(!playing){
    let start = document.getElementById("start").value;
    if(current===0) current = start-1;
  }

  playing=true;
  playNext();
}

// DURAKLAT
function pausePlay(){
  playing=false;
  p.pause();
}

// AYET AYET
function playNext(){

  if(!playing) return;

  if(current >= data.length){
    nextSurah();
    return;
  }

  p.src = data[current].audio;

  document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("active"));

  let aktif=document.getElementById("a"+current);

  if(aktif){
    aktif.classList.add("active");
    aktif.scrollIntoView({behavior:"smooth",block:"center"});
  }

  p.play().catch(()=>{});

  p.onended=()=>{
    current++;
    playNext();
  };
}

// SONRAKİ SURE
function nextSurah(){

  if(!document.getElementById("auto").checked) return;

  sura++;

  if(sura>114) return;

  document.getElementById("sure").value=sura;

  current=0;

  load();

  setTimeout(()=>{
    playNext();
  },1000);
}

</script>

</body>
</html>
