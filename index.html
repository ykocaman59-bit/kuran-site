<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Kuran Dinle PRO</title>

<style>
body{
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
  margin:0;
  user-select:none;
}

select,input,button{
  padding:10px;
  margin:6px;
  font-size:16px;
  border-radius:10px;
  border:none;
}

.ayet{
  padding:15px;
  border-bottom:1px solid #222;
}

.ar{font-size:26px;}
.tr{font-size:14px;color:#aaa;}

.kalp{font-size:20px;cursor:pointer;}
</style>
</head>

<body>

<h1>KURAN DİNLE PRO</h1>

<select id="sure"></select><br>

Başlangıç:
<input type="number" id="start" value="1"><br>

<label>
<input type="checkbox" id="auto"> Otomatik geç
</label><br>

<button onclick="load()">Yükle</button>
<button onclick="startPlay()">▶ Başlat</button>
<button onclick="pausePlay()">⏸ Duraklat</button>

<div id="list"></div>

<audio id="p"></audio>

<script>

let data=[];
let sura=1;

const p=document.getElementById("p");

// SURELER
fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(d=>{
  d.data.forEach(s=>{
    let o=document.createElement("option");
    o.value=s.number;
    o.textContent=s.number+". "+s.englishName;
    sure.appendChild(o);
  });
});

// YÜKLE
function load(){

  sura = document.getElementById("sure").value;

  Promise.all([
    fetch(`https://api.alquran.cloud/v1/surah/${sura}`).then(r=>r.json()),
    fetch(`https://api.alquran.cloud/v1/surah/${sura}/tr.diyanet`).then(r=>r.json())
  ])
  .then(([ar,tr])=>{

    data = ar.data.ayahs;

    let list = document.getElementById("list");
    list.innerHTML="";

    data.forEach((a,x)=>{

      let fav = localStorage.getItem("fav_"+sura+"_"+x)=="1";

      let div=document.createElement("div");
      div.className="ayet";
      div.id="a"+x;

      div.innerHTML=`
        <div class="ar">${a.text}</div>
        <div class="tr">${tr.data.ayahs[x].text}</div>
        <div class="kalp" onclick="favToggle(event,${x})">
          ${fav?"❤️":"🤍"}
        </div>
      `;

      list.appendChild(div);
    });

  });
}

// FAVORİ
function favToggle(e,x){
  e.stopPropagation();

  let key="fav_"+sura+"_"+x;

  if(localStorage.getItem(key)){
    localStorage.removeItem(key);
  }else{
    localStorage.setItem(key,"1");
  }

  let el=document.getElementById("a"+x).querySelector(".kalp");
  el.innerHTML = localStorage.getItem(key) ? "❤️" : "🤍";
}

// ▶️ BAŞLAT
function startPlay(){

  sura = document.getElementById("sure").value;

  let no = String(sura).padStart(3,'0');

  p.src = `https://server8.mp3quran.net/afs/${no}.mp3`;

  // kayıt varsa kaldığı yerden devam et
  let k = JSON.parse(localStorage.getItem("kuran"));
  if(k && k.sura == sura){
    p.currentTime = k.time;
  }

  p.play();
}

// ⏸ DURAKLAT
function pausePlay(){
  p.pause();
}

// 💾 SÜREKLİ KAYDET
p.ontimeupdate = () => {
  localStorage.setItem("kuran", JSON.stringify({
    sura: sura,
    time: p.currentTime
  }));
};

// 🔁 AÇILINCA GERİ YÜKLE
window.onload = () => {

  let k = JSON.parse(localStorage.getItem("kuran"));

  if(k){

    sura = k.sura;
    document.getElementById("sure").value = sura;

    load();

    setTimeout(()=>{
      let no = String(sura).padStart(3,'0');
      p.src = `https://server8.mp3quran.net/afs/${no}.mp3`;
      p.currentTime = k.time;
    },1000);

  }
};

// 🔄 SONRAKİ SURE
p.onended = function(){

  if(!document.getElementById("auto").checked) return;

  sura++;

  if(sura>114) return;

  document.getElementById("sure").value = sura;

  load();

  setTimeout(()=>{
    startPlay();
  },1000);
};

</script>

</body>
</html>
