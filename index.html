<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Kuran Dinle PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
  text-align:center;
}

select,input,button{
  padding:10px;
  margin:6px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

.ayet{
  padding:15px;
  border-bottom:1px solid #222;
}

.active{
  background:yellow;
  color:black;
}

.ar{font-size:26px;}
.tr{font-size:14px;color:#aaa;}

.kalp{font-size:20px;cursor:pointer;}
</style>
</head>

<body>

<h1>KURAN DİNLE PRO</h1>

<select id="sure"></select><br>

Başlangıç:
<input type="number" id="start" value="1"><br>

<label>
<input type="checkbox" id="auto"> Otomatik geç
</label><br>

<button onclick="load()">Yükle</button>
<button onclick="startPlay()">▶ Başlat</button>
<button onclick="pausePlay()">⏸ Duraklat</button>

<div id="list"></div>

<audio id="p"></audio>

<script>

let data=[];
let sura=1;
let current=0;
let isPlaying=false;
let started=false;

const p=document.getElementById("p");

// SURELER
fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(d=>{
  d.data.forEach(s=>{
    let o=document.createElement("option");
    o.value=s.number;
    o.textContent=s.number+". "+s.englishName;
    sure.appendChild(o);
  });
});

// YÜKLE
function load(){

  sura = document.getElementById("sure").value;

  fetch(`https://api.alquran.cloud/v1/surah/${sura}/ar.alafasy`)
  .then(r=>r.json())
  .then(d=>{

    data = d.data.ayahs;

    let list=document.getElementById("list");
    list.innerHTML="";

    data.forEach((a,x)=>{

      let fav = localStorage.getItem("fav_"+sura+"_"+x)=="1";

      let div=document.createElement("div");
      div.className="ayet";
      div.id="a"+x;

      div.innerHTML=`
        <div class="ar">${a.text}</div>
        <div class="kalp" onclick="favToggle(event,${x})">
          ${fav?"❤️":"🤍"}
        </div>
      `;

      list.appendChild(div);
    });

    // Yeni sure yüklenince reset
    current = 0;
    started = false;
  });
}

// FAVORİ (STOP ETMEZ)
function favToggle(e,x){
  e.stopPropagation();

  let key="fav_"+sura+"_"+x;

  if(localStorage.getItem(key)){
    localStorage.removeItem(key);
  }else{
    localStorage.setItem(key,"1");
  }

  let el=document.getElementById("a"+x).querySelector(".kalp");
  el.innerHTML = localStorage.getItem(key) ? "❤️" : "🤍";
}

// BAŞLAT
function startPlay(){

  // Zaten çalıyorsa tekrar başlatma
  if(isPlaying) return;

  isPlaying = true;

  // SADECE İLK BAŞLARKEN başlangıç ayetini al
  if(!started){
    let start = document.getElementById("start").value;
    current = start ? start-1 : 0;
    started = true;
  }

  playNext();
}

// DURAKLAT
function pausePlay(){
  p.pause();
  isPlaying=false;
}

// AYET AYET OYNAT
function playNext(){

  if(!isPlaying) return;

  if(current >= data.length){
    nextSurah();
    return;
  }

  p.src = data[current].audio;

  highlight();

  p.play().catch(()=>{});

  p.onended = ()=>{
    current++;
    playNext();
  };
}

// SARI TAKİP
function highlight(){

  document.querySelectorAll(".ayet").forEach(e=>e.classList.remove("active"));

  let el = document.getElementById("a"+current);

  if(el){
    el.classList.add("active");
    el.scrollIntoView({behavior:"smooth",block:"center"});
  }
}

// SONRAKİ SURE
function nextSurah(){

  if(!document.getElementById("auto").checked) return;

  sura++;

  if(sura>114) return;

  document.getElementById("sure").value = sura;

  load();

  setTimeout(()=>{
    current=0;
    started=false;
    playNext();
  },800);
}

</script>

</body>
</html>
