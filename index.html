<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kuran Dinle PRO</title><style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: Arial;
  margin:0;
  user-select:none;
}

button, select, input {
  padding: 10px;
  margin: 5px;
  font-size: 16px;
}

.ayet {
  padding: 12px;
}

.arapca {
  font-size: 22px;
  direction: rtl;
}

.meal {
  font-size: 16px;
  opacity: 0.8;
}

.active {
  background: yellow;
  color: black;
}
</style></head><body><h1>KURAN DİNLE PRO</h1><select id="sureSelect"></select><br>

Başlangıç ayeti:
<input type="number" id="startAyet" value="1" min="1"><br>

<label>
<input type="checkbox" id="autoNext" checked>
Otomatik sonraki sure
</label><br><button onclick="loadSurah()">Yükle</button>
<button onclick="playAudio()">Başlat</button>

<div id="ayetler"></div><audio id="player"></audio>

<script>

let ayetData = [];
let current = 0;
let currentSurah = 1;
let player = document.getElementById("player");

// SURELER
fetch("https://api.alquran.cloud/v1/surah")
.then(res => res.json())
.then(data => {
  let select = document.getElementById("sureSelect");

  data.data.forEach(s => {
    let opt = document.createElement("option");
    opt.value = s.number;
    opt.innerText = s.number + ". " + s.englishName;
    select.appendChild(opt);
  });
});

// SURE YÜKLE
async function loadSurah() {

  currentSurah = document.getElementById("sureSelect").value;

  let ar = await fetch(`https://api.alquran.cloud/v1/surah/${currentSurah}/ar.alafasy`);
  let tr = await fetch(`https://api.alquran.cloud/v1/surah/${currentSurah}/tr.diyanet`);

  let arData = await ar.json();
  let trData = await tr.json();

  ayetData = arData.data.ayahs.map((a,i)=>({
    ar:a.text,
    tr:trData.data.ayahs[i].text,
    audio:a.audio
  }));

  let div = document.getElementById("ayetler");
  div.innerHTML = "";

  ayetData.forEach((a,i)=>{
    div.innerHTML += `
      <div class="ayet" id="a${i}">
        <div class="arapca">${i+1}. ${a.ar}</div>
        <div class="meal">${a.tr}</div>
      </div>
    `;
  });
}

// BAŞLAT
function playAudio() {
  let start = document.getElementById("startAyet").value;
  current = start - 1;
  playNext();
}

// AYET AYET OYNAT
function playNext() {

  if (current >= ayetData.length) {
    nextSurah();
    return;
  }

  player.src = ayetData[current].audio;

  document.querySelectorAll(".ayet").forEach(e => e.classList.remove("active"));

  let aktif = document.getElementById("a" + current);
  if (aktif) aktif.classList.add("active");

  if (aktif) aktif.scrollIntoView({ behavior: "smooth", block: "center" });

  player.play().catch(()=>{});

  // ✅ EN KRİTİK FIX
  player.onended = () => {
    current++;
    setTimeout(playNext, 300);
  };

  // ❗ TAKILIRSA ATLA
  player.onerror = () => {
    current++;
    playNext();
  };
}

// SONRAKİ SURE
function nextSurah() {

  let auto = document.getElementById("autoNext").checked;

  if (!auto) return;

  currentSurah++;

  if (currentSurah > 114) return;

  document.getElementById("sureSelect").value = currentSurah;

  loadSurah();

  setTimeout(() => {
    current = 0;
    playNext();
  }, 1000);
}

</script></body>
</html>
